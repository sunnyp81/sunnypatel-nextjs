<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" width="720" height="400">
  <defs>
    <clipPath id="roundedBg1">
      <rect width="720" height="400" rx="16" ry="16"/>
    </clipPath>
    <filter id="shadow1">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <g clip-path="url(#roundedBg1)">
    <!-- Background -->
    <rect width="720" height="400" rx="16" ry="16" fill="#0a0a0f"/>

    <!-- Title -->
    <text x="36" y="38" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="bold" fill="#ffffff">AI Referral Traffic vs Google (2025)</text>
    <text x="36" y="56" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#e0e0e0" opacity="0.5">Source: Similarweb, 2025</text>

    <!-- LEFT: Google card -->
    <rect x="36" y="78" width="310" height="170" rx="10" ry="10" fill="#111118" filter="url(#shadow1)"/>
    <text x="191" y="106" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" fill="#e0e0e0" text-anchor="middle" opacity="0.7">Google Referrals</text>

    <!-- Google bar -->
    <rect x="66" y="126" width="250" height="36" rx="6" ry="6" fill="#5B8AEF" opacity="0.15"/>
    <rect x="66" y="126" width="250" height="36" rx="6" ry="6" fill="#5B8AEF" opacity="0.7"/>
    <text x="191" y="150" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">191 billion</text>

    <text x="191" y="186" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#e0e0e0" text-anchor="middle" opacity="0.6">annual referral visits</text>

    <!-- Percentage label -->
    <rect x="136" y="204" width="110" height="28" rx="6" ry="6" fill="#5B8AEF" opacity="0.1" stroke="#5B8AEF" stroke-width="1" stroke-opacity="0.3"/>
    <text x="191" y="223" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" fill="#5B8AEF" text-anchor="middle">~99% share</text>

    <!-- RIGHT: AI Platforms card -->
    <rect x="374" y="78" width="310" height="170" rx="10" ry="10" fill="#111118" filter="url(#shadow1)"/>
    <text x="529" y="106" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" fill="#e0e0e0" text-anchor="middle" opacity="0.7">AI Platform Referrals</text>

    <!-- AI bar (proportional: 2/191 = ~1%) -->
    <rect x="404" y="126" width="250" height="36" rx="6" ry="6" fill="#22c55e" opacity="0.1"/>
    <rect x="404" y="126" width="3" height="36" rx="1" ry="1" fill="#22c55e" opacity="0.7"/>
    <text x="529" y="150" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="bold" fill="#22c55e" text-anchor="middle">2 billion</text>

    <text x="529" y="186" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#e0e0e0" text-anchor="middle" opacity="0.6">annual referral visits</text>

    <!-- Percentage label -->
    <rect x="474" y="204" width="110" height="28" rx="6" ry="6" fill="#22c55e" opacity="0.1" stroke="#22c55e" stroke-width="1" stroke-opacity="0.3"/>
    <text x="529" y="223" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" fill="#22c55e" text-anchor="middle">~1% share</text>

    <!-- Growth arrow section -->
    <rect x="36" y="270" width="310" height="56" rx="10" ry="10" fill="#0a0a0f" stroke="#d79f1e" stroke-width="1.5" stroke-opacity="0.6"/>
    <rect x="36" y="270" width="310" height="56" rx="10" ry="10" fill="#d79f1e" opacity="0.06"/>
    <text x="48" y="295" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="bold" fill="#d79f1e">778%</text>
    <text x="140" y="290" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#e0e0e0" opacity="0.7">YoY growth in AI</text>
    <text x="140" y="306" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#e0e0e0" opacity="0.7">referral traffic</text>

    <!-- CTR impact box -->
    <rect x="374" y="270" width="310" height="56" rx="10" ry="10" fill="#0a0a0f" stroke="#ef4444" stroke-width="1.5" stroke-opacity="0.6"/>
    <rect x="374" y="270" width="310" height="56" rx="10" ry="10" fill="#ef4444" opacity="0.06"/>
    <text x="386" y="295" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="bold" fill="#ef4444">-61%</text>
    <text x="462" y="290" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#e0e0e0" opacity="0.7">organic CTR when AI</text>
    <text x="462" y="306" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#e0e0e0" opacity="0.7">Overviews appear</text>

    <!-- Bottom insight -->
    <rect x="36" y="344" width="648" height="38" rx="10" ry="10" fill="#22c55e" opacity="0.06" stroke="#22c55e" stroke-width="1" stroke-opacity="0.3"/>
    <circle cx="64" cy="363" r="10" fill="#22c55e" opacity="0.15"/>
    <text x="64" y="367" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#22c55e" text-anchor="middle" font-weight="bold">+</text>
    <text x="84" y="367" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold" fill="#22c55e">Brands cited in AI Overviews earn 35% more organic clicks (Seer Interactive)</text>

    <!-- Branding -->
    <text x="684" y="394" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#5B8AEF" text-anchor="end" opacity="0.35">sunnypatel.co.uk</text>
  </g>
</svg>
