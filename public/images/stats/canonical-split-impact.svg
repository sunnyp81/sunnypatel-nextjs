<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" width="720" height="400">
  <defs>
    <clipPath id="clip-canonical">
      <rect x="0" y="0" width="720" height="400" rx="16" ry="16"/>
    </clipPath>
    <linearGradient id="grad-split" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5B8AEF" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#5B8AEF" stop-opacity="0.02"/>
    </linearGradient>
  </defs>
  <g clip-path="url(#clip-canonical)">
    <rect width="720" height="400" fill="#0a0a0f" rx="16" ry="16"/>

    <!-- Title -->
    <text x="36" y="38" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="bold" fill="#ffffff">How One Trailing Slash Mistake Splits Your Rankings</text>
    <text x="36" y="56" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#e0e0e0" opacity="0.5">Real data: SEO consultant page — 5,516 impressions split across two URLs</text>

    <!-- Left side: BEFORE (split) -->
    <text x="190" y="95" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" fill="#ef4444" text-anchor="middle">BEFORE FIX</text>
    <text x="190" y="112" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#e0e0e0" opacity="0.5" text-anchor="middle">Signals split across 2 URLs</text>

    <!-- URL box 1 -->
    <rect x="40" y="130" width="300" height="90" rx="10" fill="#111118" stroke="#ef4444" stroke-opacity="0.3" stroke-width="1"/>
    <text x="56" y="154" font-family="monospace" font-size="10" fill="#ef4444">/services/seo-consultant-reading</text>
    <text x="56" y="178" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="bold" fill="#ffffff">3,529</text>
    <text x="168" y="178" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#e0e0e0" opacity="0.6">impressions</text>
    <text x="56" y="206" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#e0e0e0" opacity="0.5">pos 33.1 | 2 clicks | 0.06% CTR</text>

    <!-- URL box 2 -->
    <rect x="40" y="232" width="300" height="90" rx="10" fill="#111118" stroke="#ef4444" stroke-opacity="0.3" stroke-width="1"/>
    <text x="56" y="256" font-family="monospace" font-size="10" fill="#ef4444">/services/seo-consultant-reading/</text>
    <text x="56" y="280" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="bold" fill="#ffffff">1,987</text>
    <text x="168" y="280" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#e0e0e0" opacity="0.6">impressions</text>
    <text x="56" y="308" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#e0e0e0" opacity="0.5">pos 28.4 | 1 click | 0.05% CTR</text>

    <!-- Divider arrow -->
    <line x1="370" y1="150" x2="370" y2="310" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1" stroke-dasharray="4 4"/>
    <polygon points="388,230 398,220 398,240" fill="#5B8AEF" opacity="0.8"/>

    <!-- Right side: AFTER (consolidated) -->
    <text x="540" y="95" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" fill="#22c55e" text-anchor="middle">AFTER FIX</text>
    <text x="540" y="112" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#e0e0e0" opacity="0.5" text-anchor="middle">All signals on one canonical URL</text>

    <!-- Consolidated URL box -->
    <rect x="400" y="165" width="290" height="120" rx="10" fill="#111118" stroke="#22c55e" stroke-opacity="0.3" stroke-width="1"/>
    <text x="416" y="192" font-family="monospace" font-size="10" fill="#22c55e">/services/seo-consultant-reading/</text>
    <text x="416" y="224" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="bold" fill="#ffffff">5,516</text>
    <text x="416" y="246" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#e0e0e0" opacity="0.6">combined impressions on single URL</text>
    <text x="416" y="272" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#22c55e" opacity="0.8">consolidated authority + ranking signals</text>

    <!-- Bottom insight -->
    <rect x="36" y="345" width="648" height="40" rx="8" fill="#5B8AEF" fill-opacity="0.08"/>
    <text x="360" y="370" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#5B8AEF" text-anchor="middle">One character difference (trailing slash) was silently halving this page's ranking power for months</text>
  </g>
</svg>
