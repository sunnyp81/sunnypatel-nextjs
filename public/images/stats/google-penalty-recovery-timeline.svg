<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450" role="img" aria-label="Manual vs algorithmic Google penalty recovery timeline comparison">
  <rect width="800" height="450" fill="#0a0a0f"/>

  <!-- Title -->
  <text x="400" y="38" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#ffffff" text-anchor="middle">Google Penalty Recovery: Manual vs Algorithmic</text>
  <text x="400" y="58" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#888888" text-anchor="middle">Typical timelines from issue identified to traffic recovery</text>

  <!-- Column headers -->
  <text x="200" y="92" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#5B8AEF" text-anchor="middle">MANUAL ACTION</text>
  <text x="600" y="92" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#E87B5B" text-anchor="middle">ALGORITHMIC HIT</text>

  <!-- Divider line -->
  <line x1="400" y1="72" x2="400" y2="420" stroke="#1e1e2e" stroke-width="2"/>

  <!-- Left column: Manual Action steps -->
  <!-- Step 1 -->
  <circle cx="200" cy="140" r="20" fill="#5B8AEF" opacity="0.15"/>
  <circle cx="200" cy="140" r="20" fill="none" stroke="#5B8AEF" stroke-width="1.5"/>
  <text x="200" y="145" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#5B8AEF" text-anchor="middle">1</text>
  <text x="240" y="136" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#ffffff">Check GSC Manual Actions</text>
  <text x="240" y="152" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#888888">Notification present — penalty confirmed</text>
  <text x="240" y="166" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#5B8AEF">Day 0</text>

  <!-- connector -->
  <line x1="200" y1="160" x2="200" y2="188" stroke="#5B8AEF" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Step 2 -->
  <circle cx="200" cy="208" r="20" fill="#5B8AEF" opacity="0.15"/>
  <circle cx="200" cy="208" r="20" fill="none" stroke="#5B8AEF" stroke-width="1.5"/>
  <text x="200" y="213" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#5B8AEF" text-anchor="middle">2</text>
  <text x="240" y="204" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#ffffff">Audit + Fix Root Cause</text>
  <text x="240" y="220" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#888888">Links, cloaking, thin content — fully resolved</text>
  <text x="240" y="234" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#5B8AEF">Weeks 1–4</text>

  <!-- connector -->
  <line x1="200" y1="228" x2="200" y2="256" stroke="#5B8AEF" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Step 3 -->
  <circle cx="200" cy="276" r="20" fill="#5B8AEF" opacity="0.15"/>
  <circle cx="200" cy="276" r="20" fill="none" stroke="#5B8AEF" stroke-width="1.5"/>
  <text x="200" y="281" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#5B8AEF" text-anchor="middle">3</text>
  <text x="240" y="272" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#ffffff">Submit Reconsideration Request</text>
  <text x="240" y="288" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#888888">Document every fix. One shot — make it count</text>
  <text x="240" y="302" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#5B8AEF">Week 4–5</text>

  <!-- connector -->
  <line x1="200" y1="296" x2="200" y2="324" stroke="#5B8AEF" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Step 4 -->
  <circle cx="200" cy="344" r="20" fill="#5B8AEF" opacity="0.25"/>
  <circle cx="200" cy="344" r="20" fill="none" stroke="#5B8AEF" stroke-width="1.5"/>
  <text x="200" y="349" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#5B8AEF" text-anchor="middle">4</text>
  <text x="240" y="340" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#ffffff">Google Reviews + Lifts Penalty</text>
  <text x="240" y="356" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#888888">Traffic begins recovering within days of lift</text>
  <text x="240" y="370" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#5B8AEF">Weeks 6–12</text>

  <!-- Total time badge - left -->
  <rect x="60" y="400" width="280" height="28" rx="4" fill="#5B8AEF" opacity="0.15"/>
  <rect x="60" y="400" width="280" height="28" rx="4" fill="none" stroke="#5B8AEF" stroke-width="1"/>
  <text x="200" y="419" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#5B8AEF" text-anchor="middle">Typical recovery: 6–12 weeks total</text>

  <!-- Right column: Algorithmic steps -->
  <!-- Step 1 -->
  <circle cx="600" cy="140" r="20" fill="#E87B5B" opacity="0.15"/>
  <circle cx="600" cy="140" r="20" fill="none" stroke="#E87B5B" stroke-width="1.5"/>
  <text x="600" y="145" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#E87B5B" text-anchor="middle">1</text>
  <text x="430" y="136" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#ffffff">Match Drop to Update Date</text>
  <text x="430" y="152" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#888888">No GSC notification — cross-reference update log</text>
  <text x="430" y="166" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#E87B5B">Day 0</text>

  <!-- connector -->
  <line x1="600" y1="160" x2="600" y2="188" stroke="#E87B5B" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Step 2 -->
  <circle cx="600" cy="208" r="20" fill="#E87B5B" opacity="0.15"/>
  <circle cx="600" cy="208" r="20" fill="none" stroke="#E87B5B" stroke-width="1.5"/>
  <text x="600" y="213" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#E87B5B" text-anchor="middle">2</text>
  <text x="430" y="204" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#ffffff">Identify Signal Type</text>
  <text x="430" y="220" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#888888">HCU, Penguin, Panda, or Core — each has different fix</text>
  <text x="430" y="234" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#E87B5B">Weeks 1–2</text>

  <!-- connector -->
  <line x1="600" y1="228" x2="600" y2="256" stroke="#E87B5B" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Step 3 -->
  <circle cx="600" cy="276" r="20" fill="#E87B5B" opacity="0.15"/>
  <circle cx="600" cy="276" r="20" fill="none" stroke="#E87B5B" stroke-width="1.5"/>
  <text x="600" y="281" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#E87B5B" text-anchor="middle">3</text>
  <text x="430" y="272" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#ffffff">Improve Quality Signals</text>
  <text x="430" y="288" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#888888">Content depth, E-E-A-T, remove thin pages</text>
  <text x="430" y="302" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#E87B5B">Months 1–3</text>

  <!-- connector -->
  <line x1="600" y1="296" x2="600" y2="324" stroke="#E87B5B" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Step 4 -->
  <circle cx="600" cy="344" r="20" fill="#E87B5B" opacity="0.25"/>
  <circle cx="600" cy="344" r="20" fill="none" stroke="#E87B5B" stroke-width="1.5"/>
  <text x="600" y="349" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#E87B5B" text-anchor="middle">4</text>
  <text x="430" y="340" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#ffffff">Wait for Next Core Update</text>
  <text x="430" y="356" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#888888">Google reassesses — no reconsideration route exists</text>
  <text x="430" y="370" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#E87B5B">Months 3–6+</text>

  <!-- Total time badge - right -->
  <rect x="460" y="400" width="280" height="28" rx="4" fill="#E87B5B" opacity="0.15"/>
  <rect x="460" y="400" width="280" height="28" rx="4" fill="none" stroke="#E87B5B" stroke-width="1"/>
  <text x="600" y="419" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#E87B5B" text-anchor="middle">Typical recovery: 3–6 months total</text>
</svg>
