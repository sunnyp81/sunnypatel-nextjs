<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 380" width="720" height="380">
  <defs>
    <clipPath id="clip-time-alloc">
      <rect x="0" y="0" width="720" height="380" rx="16" ry="16"/>
    </clipPath>
  </defs>
  <g clip-path="url(#clip-time-alloc)">
    <rect width="720" height="380" fill="#0a0a0f" rx="16" ry="16"/>

    <!-- Title -->
    <text x="36" y="38" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="bold" fill="#ffffff">Time Allocation Across 44 Sites</text>
    <text x="36" y="58" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#e0e0e0" opacity="0.5">Not every site deserves equal attention — prioritise by revenue potential</text>

    <!-- Stacked horizontal breakdown -->
    <!-- Category labels and bars -->

    <!-- High priority: 4 sites -->
    <rect x="36" y="82" width="310" height="62" rx="10" fill="#111118"/>
    <circle cx="56" cy="106" r="6" fill="#ef4444"/>
    <text x="70" y="100" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" fill="#ffffff">High Priority</text>
    <text x="70" y="116" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#e0e0e0" opacity="0.5">Revenue sites with fixable issues</text>
    <text x="250" y="100" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#e0e0e0" opacity="0.7" text-anchor="end">4 sites</text>
    <text x="250" y="116" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" fill="#ef4444" text-anchor="end">15-20 hrs/mo each</text>

    <!-- Growth phase: 8 sites -->
    <rect x="36" y="152" width="310" height="62" rx="10" fill="#111118"/>
    <circle cx="56" cy="176" r="6" fill="#d79f1e"/>
    <text x="70" y="170" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" fill="#ffffff">Growth Phase</text>
    <text x="70" y="186" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#e0e0e0" opacity="0.5">Building content, no revenue yet</text>
    <text x="250" y="170" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#e0e0e0" opacity="0.7" text-anchor="end">8 sites</text>
    <text x="250" y="186" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" fill="#d79f1e" text-anchor="end">8-12 hrs/mo each</text>

    <!-- Maintenance: 14 sites -->
    <rect x="36" y="222" width="310" height="62" rx="10" fill="#111118"/>
    <circle cx="56" cy="246" r="6" fill="#5B8AEF"/>
    <text x="70" y="240" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" fill="#ffffff">Maintenance</text>
    <text x="70" y="256" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#e0e0e0" opacity="0.5">Stable traffic, earning revenue</text>
    <text x="250" y="240" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#e0e0e0" opacity="0.7" text-anchor="end">14 sites</text>
    <text x="250" y="256" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" fill="#5B8AEF" text-anchor="end">2-4 hrs/mo each</text>

    <!-- Monitor only: 18 sites -->
    <rect x="36" y="292" width="310" height="62" rx="10" fill="#111118"/>
    <circle cx="56" cy="316" r="6" fill="#22c55e"/>
    <text x="70" y="310" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" fill="#ffffff">Monitor Only</text>
    <text x="70" y="326" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#e0e0e0" opacity="0.5">Coasting, minimal intervention</text>
    <text x="250" y="310" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#e0e0e0" opacity="0.7" text-anchor="end">18 sites</text>
    <text x="250" y="326" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" fill="#22c55e" text-anchor="end">30 min/mo each</text>

    <!-- Right side: proportional visual -->
    <text x="400" y="88" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold" fill="#e0e0e0">Monthly hours distribution</text>

    <!-- Proportional blocks (total ~200 hrs) -->
    <!-- High: 4 x 17.5 = 70 hrs -->
    <rect x="400" y="104" width="280" height="52" rx="6" fill="#ef4444" opacity="0.85"/>
    <text x="410" y="126" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#ffffff" font-weight="bold">High Priority — 70 hrs (35%)</text>
    <text x="410" y="142" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff" opacity="0.7">4 sites getting most of the budget</text>

    <!-- Growth: 8 x 10 = 80 hrs -->
    <rect x="400" y="162" width="280" height="56" rx="6" fill="#d79f1e" opacity="0.85"/>
    <text x="410" y="186" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#ffffff" font-weight="bold">Growth Phase — 80 hrs (40%)</text>
    <text x="410" y="202" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff" opacity="0.7">8 sites being actively built</text>

    <!-- Maintenance: 14 x 3 = 42 hrs -->
    <rect x="400" y="224" width="280" height="42" rx="6" fill="#5B8AEF" opacity="0.85"/>
    <text x="410" y="244" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#ffffff" font-weight="bold">Maintenance — 42 hrs (21%)</text>
    <text x="410" y="256" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff" opacity="0.7">14 sites on autopilot</text>

    <!-- Monitor: 18 x 0.5 = 9 hrs -->
    <rect x="400" y="272" width="280" height="18" rx="4" fill="#22c55e" opacity="0.85"/>
    <text x="410" y="285" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff" font-weight="bold">Monitor — 9 hrs (4%)</text>

    <!-- Total -->
    <rect x="400" y="304" width="280" height="50" rx="10" fill="#111118" stroke="#e0e0e0" stroke-opacity="0.1" stroke-width="1"/>
    <text x="420" y="326" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#e0e0e0" opacity="0.5">TOTAL MONTHLY</text>
    <text x="420" y="344" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="bold" fill="#ffffff">~201 hours</text>
    <text x="544" y="344" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#e0e0e0" opacity="0.5">across 44 sites</text>
  </g>
</svg>
