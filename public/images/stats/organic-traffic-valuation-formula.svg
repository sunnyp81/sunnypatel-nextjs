<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" width="720" height="400">
  <defs>
    <clipPath id="clip-valuation">
      <rect x="0" y="0" width="720" height="400" rx="16" ry="16"/>
    </clipPath>
  </defs>
  <g clip-path="url(#clip-valuation)">
    <rect width="720" height="400" fill="#0a0a0f" rx="16" ry="16"/>

    <!-- Title -->
    <text x="36" y="38" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="bold" fill="#ffffff">Organic Traffic Valuation: Broker Number vs Real Number</text>
    <text x="36" y="56" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#e0e0e0" opacity="0.5">Same site — two very different valuations</text>

    <!-- Left card: Broker Version -->
    <rect x="36" y="78" width="310" height="290" rx="10" fill="#111118"/>
    <text x="56" y="106" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" fill="#ef4444">Broker Version</text>
    <text x="56" y="124" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#e0e0e0" opacity="0.4">Google Analytics — total organic</text>

    <!-- Broker big number -->
    <text x="56" y="170" font-family="Arial, Helvetica, sans-serif" font-size="40" font-weight="bold" fill="#ef4444">14,200</text>
    <text x="56" y="190" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#e0e0e0" opacity="0.6">monthly organic visits</text>

    <!-- Broker breakdown -->
    <text x="56" y="220" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#e0e0e0" opacity="0.7">Includes:</text>
    <rect x="56" y="232" width="120" height="8" rx="4" fill="#ef4444" opacity="0.3"/>
    <text x="182" y="240" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#e0e0e0" opacity="0.5">7,400 brand searches</text>
    <rect x="56" y="250" width="60" height="8" rx="4" fill="#ef4444" opacity="0.3"/>
    <text x="122" y="258" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#e0e0e0" opacity="0.5">2,100 bot/spam</text>
    <rect x="56" y="268" width="20" height="8" rx="4" fill="#ef4444" opacity="0.3"/>
    <text x="82" y="276" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#e0e0e0" opacity="0.5">900 seasonal spike</text>

    <!-- Broker valuation -->
    <line x1="56" y1="296" x2="310" y2="296" stroke="#e0e0e0" stroke-width="0.5" opacity="0.2"/>
    <text x="56" y="316" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#e0e0e0" opacity="0.5">Revenue est. × 30x multiplier</text>
    <text x="56" y="340" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="bold" fill="#ef4444">£142,000</text>
    <text x="56" y="358" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#e0e0e0" opacity="0.4">inflated valuation</text>

    <!-- Right card: Real Version -->
    <rect x="374" y="78" width="310" height="290" rx="10" fill="#111118"/>
    <text x="394" y="106" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" fill="#22c55e">GSC Reality</text>
    <text x="394" y="124" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#e0e0e0" opacity="0.4">Non-brand clicks only</text>

    <!-- Real big number -->
    <text x="394" y="170" font-family="Arial, Helvetica, sans-serif" font-size="40" font-weight="bold" fill="#22c55e">3,800</text>
    <text x="394" y="190" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#e0e0e0" opacity="0.6">revenue-driving visits</text>

    <!-- Real breakdown -->
    <text x="394" y="220" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#e0e0e0" opacity="0.7">Filtered to:</text>
    <rect x="394" y="232" width="60" height="8" rx="4" fill="#22c55e" opacity="0.4"/>
    <text x="460" y="240" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#e0e0e0" opacity="0.5">Non-brand only</text>
    <rect x="394" y="250" width="40" height="8" rx="4" fill="#22c55e" opacity="0.4"/>
    <text x="440" y="258" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#e0e0e0" opacity="0.5">Converting queries</text>
    <rect x="394" y="268" width="30" height="8" rx="4" fill="#22c55e" opacity="0.4"/>
    <text x="430" y="276" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#e0e0e0" opacity="0.5">12-month average</text>

    <!-- Real valuation -->
    <line x1="394" y1="296" x2="648" y2="296" stroke="#e0e0e0" stroke-width="0.5" opacity="0.2"/>
    <text x="394" y="316" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#e0e0e0" opacity="0.5">Actual revenue × 30x multiplier</text>
    <text x="394" y="340" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="bold" fill="#22c55e">£38,000</text>
    <text x="394" y="358" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#e0e0e0" opacity="0.4">defensible valuation</text>

    <!-- Center arrow -->
    <text x="352" y="210" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#d79f1e" text-anchor="middle">→</text>
    <text x="352" y="230" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#d79f1e" text-anchor="middle" opacity="0.7">-73%</text>
  </g>
</svg>
