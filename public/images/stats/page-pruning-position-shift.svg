<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 380" width="720" height="380">
  <defs>
    <clipPath id="clip-prune">
      <rect x="0" y="0" width="720" height="380" rx="16" ry="16"/>
    </clipPath>
    <linearGradient id="bar-grad-before" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="bar-grad-after" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0.6"/>
    </linearGradient>
  </defs>
  <g clip-path="url(#clip-prune)">
    <rect width="720" height="380" fill="#0a0a0f" rx="16" ry="16"/>

    <!-- Title -->
    <text x="36" y="38" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="bold" fill="#ffffff">Page Pruning: Remove the Weak, Strengthen the Rest</text>
    <text x="36" y="56" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#e0e0e0" opacity="0.5">sunnypatel.co.uk — noindexed 80+ low-value pages (tag pages, zero-click city pages)</text>

    <!-- Metric cards row -->
    <!-- Card 1: Avg Position -->
    <rect x="36" y="78" width="210" height="100" rx="10" fill="#111118"/>
    <text x="52" y="102" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#e0e0e0" opacity="0.5" text-transform="uppercase" letter-spacing="1">AVG POSITION</text>
    <text x="52" y="138" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#ef4444">31.6</text>
    <text x="100" y="138" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#e0e0e0" opacity="0.3">&rarr;</text>
    <text x="124" y="138" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#22c55e">25.6</text>
    <text x="52" y="162" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="bold" fill="#22c55e">+6 positions</text>

    <!-- Card 2: Homepage -->
    <rect x="258" y="78" width="210" height="100" rx="10" fill="#111118"/>
    <text x="274" y="102" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#e0e0e0" opacity="0.5" text-transform="uppercase" letter-spacing="1">HOMEPAGE POSITION</text>
    <text x="274" y="138" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#ef4444">5.3</text>
    <text x="310" y="138" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#e0e0e0" opacity="0.3">&rarr;</text>
    <text x="334" y="138" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#22c55e">3.8</text>
    <text x="274" y="162" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="bold" fill="#22c55e">+1.5 positions</text>

    <!-- Card 3: Pages Indexed -->
    <rect x="480" y="78" width="210" height="100" rx="10" fill="#111118"/>
    <text x="496" y="102" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#e0e0e0" opacity="0.5" text-transform="uppercase" letter-spacing="1">INDEXED PAGES</text>
    <text x="496" y="138" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#ef4444">178</text>
    <text x="530" y="138" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#e0e0e0" opacity="0.3">&rarr;</text>
    <text x="554" y="138" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#22c55e">~95</text>
    <text x="496" y="162" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="bold" fill="#5B8AEF">-47% bloat removed</text>

    <!-- Before/After bar chart -->
    <text x="36" y="218" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold" fill="#e0e0e0">What was removed</text>

    <!-- Bar: Tag pages -->
    <text x="36" y="248" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#e0e0e0" opacity="0.7">Tag pages (62)</text>
    <rect x="180" y="236" width="186" height="18" rx="4" fill="url(#bar-grad-before)" opacity="0.6"/>
    <text x="375" y="250" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ef4444">noindexed</text>

    <!-- Bar: Remote city pages -->
    <text x="36" y="278" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#e0e0e0" opacity="0.7">City pages (18)</text>
    <rect x="180" y="266" width="54" height="18" rx="4" fill="url(#bar-grad-before)" opacity="0.6"/>
    <text x="243" y="280" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ef4444">noindexed — 0 clicks, pos 35-72</text>

    <!-- Bar: Ghost URLs -->
    <text x="36" y="308" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#e0e0e0" opacity="0.7">Ghost URLs (7+)</text>
    <rect x="180" y="296" width="21" height="18" rx="4" fill="url(#bar-grad-before)" opacity="0.6"/>
    <text x="210" y="310" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ef4444">duplicate canonicals from old paths</text>

    <!-- Bottom insight -->
    <rect x="36" y="335" width="648" height="34" rx="8" fill="#22c55e" fill-opacity="0.08"/>
    <text x="360" y="357" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#22c55e" text-anchor="middle">Result: Google's crawl budget focused on 95 strong pages instead of 178 mixed signals. Positions improved in 10 days.</text>
  </g>
</svg>
