<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450" role="img" aria-label="Decision tree for diagnosing whether a Google traffic drop is a manual action or algorithmic penalty">
  <rect width="800" height="450" fill="#0a0a0f"/>

  <!-- Title -->
  <text x="400" y="36" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#ffffff" text-anchor="middle">Penalty Diagnosis: Is It Manual or Algorithmic?</text>
  <text x="400" y="55" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#888888" text-anchor="middle">Work through this before touching anything on the site</text>

  <!-- START node -->
  <rect x="290" y="72" width="220" height="36" rx="18" fill="#1e1e2e" stroke="#5B8AEF" stroke-width="1.5"/>
  <text x="400" y="95" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#ffffff" text-anchor="middle">Traffic dropped — what happened?</text>

  <!-- Arrow down -->
  <line x1="400" y1="108" x2="400" y2="130" stroke="#444466" stroke-width="1.5"/>
  <polygon points="396,127 404,127 400,134" fill="#444466"/>

  <!-- Q1: Check GSC -->
  <rect x="265" y="134" width="270" height="38" rx="6" fill="#111122" stroke="#5B8AEF" stroke-width="1.5"/>
  <text x="400" y="150" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#5B8AEF" text-anchor="middle">STEP 1: Check GSC Manual Actions</text>
  <text x="400" y="165" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#aaaaaa" text-anchor="middle">Security &amp; Manual Actions → Manual Actions</text>

  <!-- Arrow down + split -->
  <line x1="400" y1="172" x2="400" y2="192" stroke="#444466" stroke-width="1.5"/>

  <!-- Diamond Q1 -->
  <polygon points="400,192 460,222 400,252 340,222" fill="#0d0d1a" stroke="#888888" stroke-width="1.5"/>
  <text x="400" y="218" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#ffffff" text-anchor="middle">Penalty listed?</text>

  <!-- YES arrow left -->
  <line x1="340" y1="222" x2="180" y2="222" stroke="#5B8AEF" stroke-width="1.5"/>
  <polygon points="183,218 183,226 176,222" fill="#5B8AEF"/>
  <text x="260" y="215" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#5B8AEF" text-anchor="middle">YES</text>

  <!-- NO arrow right -->
  <line x1="460" y1="222" x2="620" y2="222" stroke="#E87B5B" stroke-width="1.5"/>
  <polygon points="617,218 617,226 624,222" fill="#E87B5B"/>
  <text x="540" y="215" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#E87B5B" text-anchor="middle">NO</text>

  <!-- LEFT BRANCH: Manual Action -->
  <rect x="60" y="240" width="240" height="38" rx="6" fill="#111122" stroke="#5B8AEF" stroke-width="1.5"/>
  <text x="180" y="256" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#5B8AEF" text-anchor="middle">MANUAL ACTION CONFIRMED</text>
  <text x="180" y="271" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#aaaaaa" text-anchor="middle">Note the type (site-wide vs page-level)</text>

  <!-- Left sub-steps -->
  <line x1="180" y1="278" x2="180" y2="298" stroke="#5B8AEF" stroke-width="1" stroke-dasharray="3,3"/>
  <rect x="60" y="298" width="240" height="28" rx="4" fill="#0d0d1a" stroke="#5B8AEF" stroke-width="1" opacity="0.8"/>
  <text x="180" y="316" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#ffffff" text-anchor="middle">Fix root cause fully (links / content / code)</text>

  <line x1="180" y1="326" x2="180" y2="342" stroke="#5B8AEF" stroke-width="1" stroke-dasharray="3,3"/>
  <rect x="60" y="342" width="240" height="28" rx="4" fill="#0d0d1a" stroke="#5B8AEF" stroke-width="1" opacity="0.8"/>
  <text x="180" y="360" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#ffffff" text-anchor="middle">Submit reconsideration request in GSC</text>

  <line x1="180" y1="370" x2="180" y2="386" stroke="#5B8AEF" stroke-width="1" stroke-dasharray="3,3"/>
  <rect x="60" y="386" width="240" height="30" rx="14" fill="#5B8AEF" opacity="0.2"/>
  <rect x="60" y="386" width="240" height="30" rx="14" fill="none" stroke="#5B8AEF" stroke-width="1.5"/>
  <text x="180" y="405" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#5B8AEF" text-anchor="middle">Expect: 2–8 weeks for review</text>

  <!-- RIGHT BRANCH: No manual action -->
  <rect x="500" y="240" width="240" height="38" rx="6" fill="#111122" stroke="#E87B5B" stroke-width="1.5"/>
  <text x="620" y="256" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#E87B5B" text-anchor="middle">NO MANUAL ACTION — DIG DEEPER</text>
  <text x="620" y="271" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#aaaaaa" text-anchor="middle">Technical or algorithmic — need to distinguish</text>

  <!-- Right sub-steps: two branches -->
  <line x1="620" y1="278" x2="620" y2="295" stroke="#E87B5B" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Sub-diamond: match to update? -->
  <polygon points="620,295 672,318 620,341 568,318" fill="#0d0d1a" stroke="#888888" stroke-width="1.5"/>
  <text x="620" y="315" font-family="system-ui, -apple-system, sans-serif" font-size="9.5" font-weight="600" fill="#ffffff" text-anchor="middle">Drop matches</text>
  <text x="620" y="328" font-family="system-ui, -apple-system, sans-serif" font-size="9.5" font-weight="600" fill="#ffffff" text-anchor="middle">update date?</text>

  <!-- YES: algorithmic -->
  <line x1="568" y1="318" x2="506" y2="318" stroke="#E87B5B" stroke-width="1.5"/>
  <polygon points="509,314 509,322 502,318" fill="#E87B5B"/>
  <text x="537" y="312" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#E87B5B" text-anchor="middle">YES</text>
  <rect x="470" y="330" width="36" height="0"/>

  <rect x="500" y="342" width="0" height="0"/>

  <!-- Algorithmic label -->
  <rect x="420" y="332" width="78" height="24" rx="4" fill="#0d0d1a" stroke="#E87B5B" stroke-width="1"/>
  <text x="459" y="348" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="600" fill="#E87B5B" text-anchor="middle">Algorithmic</text>
  <text x="459" y="370" font-family="system-ui, -apple-system, sans-serif" font-size="8.5" fill="#aaaaaa" text-anchor="middle">HCU / Core / Penguin</text>
  <text x="459" y="386" font-family="system-ui, -apple-system, sans-serif" font-size="8.5" fill="#aaaaaa" text-anchor="middle">Fix signals + wait</text>
  <text x="459" y="404" font-family="system-ui, -apple-system, sans-serif" font-size="8.5" fill="#E87B5B" text-anchor="middle">3–6 months</text>

  <!-- NO: technical -->
  <line x1="672" y1="318" x2="730" y2="318" stroke="#44aa88" stroke-width="1.5"/>
  <polygon points="727,314 727,322 734,318" fill="#44aa88"/>
  <text x="701" y="312" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#44aa88" text-anchor="middle">NO</text>

  <rect x="700" y="332" width="78" height="24" rx="4" fill="#0d0d1a" stroke="#44aa88" stroke-width="1"/>
  <text x="739" y="348" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="600" fill="#44aa88" text-anchor="middle">Technical</text>
  <text x="739" y="370" font-family="system-ui, -apple-system, sans-serif" font-size="8.5" fill="#aaaaaa" text-anchor="middle">Crawl / redirects</text>
  <text x="739" y="386" font-family="system-ui, -apple-system, sans-serif" font-size="8.5" fill="#aaaaaa" text-anchor="middle">robots / canonical</text>
  <text x="739" y="404" font-family="system-ui, -apple-system, sans-serif" font-size="8.5" fill="#44aa88" text-anchor="middle">4–12 weeks</text>

  <!-- Legend bar -->
  <rect x="30" y="432" width="740" height="1" fill="#1e1e2e"/>
  <circle cx="48" cy="443" r="5" fill="#5B8AEF" opacity="0.7"/>
  <text x="58" y="447" font-family="system-ui, -apple-system, sans-serif" font-size="9.5" fill="#888888">Manual action path</text>
  <circle cx="168" cy="443" r="5" fill="#E87B5B" opacity="0.7"/>
  <text x="178" y="447" font-family="system-ui, -apple-system, sans-serif" font-size="9.5" fill="#888888">Algorithmic path</text>
  <circle cx="288" cy="443" r="5" fill="#44aa88" opacity="0.7"/>
  <text x="298" y="447" font-family="system-ui, -apple-system, sans-serif" font-size="9.5" fill="#888888">Technical path</text>
  <text x="770" y="447" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#444466" text-anchor="end">sunnypatel.co.uk</text>
</svg>
