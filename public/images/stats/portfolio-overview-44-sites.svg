<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" width="720" height="360">
  <defs>
    <clipPath id="clip-portfolio">
      <rect x="0" y="0" width="720" height="360" rx="16" ry="16"/>
    </clipPath>
  </defs>
  <g clip-path="url(#clip-portfolio)">
    <rect width="720" height="360" fill="#0a0a0f" rx="16" ry="16"/>

    <!-- Title -->
    <text x="36" y="38" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="bold" fill="#ffffff">44 Websites. One Dashboard. Real Numbers.</text>
    <text x="36" y="56" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#e0e0e0" opacity="0.5">Portfolio-wide stats — not cherry-picked case studies</text>

    <!-- Grid of stat cards -->
    <!-- Row 1 -->
    <rect x="36" y="78" width="155" height="80" rx="10" fill="#111118"/>
    <text x="52" y="100" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#e0e0e0" opacity="0.5" text-transform="uppercase" letter-spacing="1">SITES MANAGED</text>
    <text x="52" y="134" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="bold" fill="#5B8AEF">44</text>

    <rect x="203" y="78" width="155" height="80" rx="10" fill="#111118"/>
    <text x="219" y="100" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#e0e0e0" opacity="0.5" text-transform="uppercase" letter-spacing="1">TOTAL PAGES</text>
    <text x="219" y="134" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="bold" fill="#ffffff">200K+</text>

    <rect x="370" y="78" width="155" height="80" rx="10" fill="#111118"/>
    <text x="386" y="100" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#e0e0e0" opacity="0.5" text-transform="uppercase" letter-spacing="1">NICHES COVERED</text>
    <text x="386" y="134" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="bold" fill="#ffffff">15+</text>

    <rect x="537" y="78" width="155" height="80" rx="10" fill="#111118"/>
    <text x="553" y="100" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#e0e0e0" opacity="0.5" text-transform="uppercase" letter-spacing="1">STACKS</text>
    <text x="553" y="126" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#e0e0e0">Astro, Next.js,</text>
    <text x="553" y="142" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#e0e0e0">WordPress, Static</text>

    <!-- Row 2: Issue discovery stats -->
    <text x="36" y="192" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold" fill="#e0e0e0">Common issues found across the portfolio</text>

    <rect x="36" y="208" width="210" height="68" rx="10" fill="#111118" stroke="#ef4444" stroke-opacity="0.15" stroke-width="1"/>
    <text x="52" y="232" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#e0e0e0" opacity="0.7">Canonical splitting</text>
    <text x="52" y="256" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="bold" fill="#ef4444">23 sites</text>
    <text x="170" y="256" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#e0e0e0" opacity="0.4">affected</text>

    <rect x="258" y="208" width="210" height="68" rx="10" fill="#111118" stroke="#d79f1e" stroke-opacity="0.15" stroke-width="1"/>
    <text x="274" y="232" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#e0e0e0" opacity="0.7">Title truncation</text>
    <text x="274" y="256" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="bold" fill="#d79f1e">8 sites</text>
    <text x="354" y="256" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#e0e0e0" opacity="0.4">affected</text>

    <rect x="480" y="208" width="210" height="68" rx="10" fill="#111118" stroke="#5B8AEF" stroke-opacity="0.15" stroke-width="1"/>
    <text x="496" y="232" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#e0e0e0" opacity="0.7">Index bloat</text>
    <text x="496" y="256" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="bold" fill="#5B8AEF">31 sites</text>
    <text x="582" y="256" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#e0e0e0" opacity="0.4">affected</text>

    <!-- Bottom insight -->
    <rect x="36" y="300" width="648" height="44" rx="8" fill="#5B8AEF" fill-opacity="0.08"/>
    <text x="360" y="318" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#5B8AEF" text-anchor="middle">The same 3 issues appeared across nearly every site.</text>
    <text x="360" y="334" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#e0e0e0" opacity="0.5" text-anchor="middle">If you manage multiple websites, these are almost certainly affecting yours too.</text>
  </g>
</svg>
