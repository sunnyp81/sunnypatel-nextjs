    <text x="610" y="37" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#e0e0e0" opacity="0.6">Week 1</text>
    <circle cx="665" cy="33" r="5" fill="#5B8AEF"/>
    <text x="675" y="37" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#e0e0e0" opacity="0.6">Ongoing</text>

