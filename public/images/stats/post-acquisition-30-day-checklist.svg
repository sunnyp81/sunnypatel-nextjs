    <rect x="486" y="166" width="16" height="16" rx="3" fill="none" stroke="#5B8AEF" stroke-width="1.5"/>
    <text x="510" y="177" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#e0e0e0">Crawl error rate</text>

    <!-- Item 4 -->
    <rect x="486" y="192" width="16" height="16" rx="3" fill="none" stroke="#5B8AEF" stroke-width="1.5"/>
    <text x="510" y="203" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#e0e0e0">Core Web Vitals status</text>

    <!-- Item 5 -->
    <rect x="486" y="218" width="16" height="16" rx="3" fill="none" stroke="#5B8AEF" stroke-width="1.5"/>
    <text x="510" y="229" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#e0e0e0">Top 20 pages traffic</text>

    <!-- Red flag thresholds -->
    <rect x="486" y="256" width="182" height="80" rx="6" fill="#0a0a0f"/>
    <text x="500" y="274" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="bold" fill="#ef4444">Red flag thresholds:</text>
    <text x="500" y="292" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#e0e0e0" opacity="0.7">Non-brand clicks -15% w/w</text>
    <text x="500" y="306" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#e0e0e0" opacity="0.7">Indexed pages -10% unexplained</text>
    <text x="500" y="320" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#e0e0e0" opacity="0.7">Any new 5xx crawl errors</text>

    <!-- Bottom bar -->
    <rect x="36" y="398" width="648" height="3" rx="1.5" fill="#5B8AEF" opacity="0.3"/>
    <rect x="36" y="398" width="214" height="3" rx="1.5" fill="#ef4444"/>
    <rect x="262" y="398" width="196" height="3" rx="1.5" fill="#d79f1e"/>
    <rect x="470" y="398" width="214" height="3" rx="1.5" fill="#5B8AEF"/>

    <!-- Timeline labels -->
    <text x="110" y="414" font-family="Arial, Helvetica, sans-serif" font-size="8" fill="#e0e0e0" opacity="0.4" text-anchor="middle">Day 1-3</text>
    <text x="360" y="414" font-family="Arial, Helvetica, sans-serif" font-size="8" fill="#e0e0e0" opacity="0.4" text-anchor="middle">Day 4-7</text>
    <text x="577" y="414" font-family="Arial, Helvetica, sans-serif" font-size="8" fill="#e0e0e0" opacity="0.4" text-anchor="middle">Day 7-30</text>
