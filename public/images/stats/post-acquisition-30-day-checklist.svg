    <text x="76" y="151" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#e0e0e0">Check manual actions</text>

    <!-- Item 3 -->
    <rect x="52" y="166" width="16" height="16" rx="3" fill="none" stroke="#ef4444" stroke-width="1.5"/>
    <polyline points="55,174 59,178 65,170" stroke="#22c55e" stroke-width="2" fill="none" stroke-linecap="round"/>
    <text x="76" y="177" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#e0e0e0">Export backlink profile</text>

