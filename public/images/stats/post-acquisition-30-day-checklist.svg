    <text x="76" y="125" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#e0e0e0">Transfer GSC ownership</text>

    <!-- Item 2 -->
    <rect x="52" y="140" width="16" height="16" rx="3" fill="none" stroke="#ef4444" stroke-width="1.5"/>
