<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" width="720" height="420">
  <defs>
    <clipPath id="clip-breakage">
      <rect x="0" y="0" width="720" height="420" rx="16" ry="16"/>
    </clipPath>
  </defs>
  <g clip-path="url(#clip-breakage)">
    <rect width="720" height="420" fill="#0a0a0f" rx="16" ry="16"/>

    <!-- Title -->
    <text x="36" y="38" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="bold" fill="#ffffff">What Breaks During a Website Redesign</text>
    <text x="36" y="56" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#e0e0e0" opacity="0.5">Six common breakage points ranked by traffic impact severity</text>

    <!-- Row 1 -->
    <!-- Card 1: URLs -->
    <rect x="36" y="75" width="215" height="150" rx="10" fill="#111118"/>
    <rect x="36" y="75" width="215" height="3" rx="2" fill="#ef4444"/>
    <text x="54" y="102" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">URLs Changed</text>
    <rect x="170" y="89" width="68" height="18" rx="4" fill="#ef4444" opacity="0.15"/>
    <text x="204" y="102" font-family="Arial, Helvetica, sans-serif" font-size="9" font-weight="bold" fill="#ef4444" text-anchor="middle">CRITICAL</text>
    <text x="54" y="122" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#e0e0e0" opacity="0.7">Missing 301 redirects cause</text>
    <text x="54" y="136" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#e0e0e0" opacity="0.7">immediate ranking loss.</text>
    <text x="54" y="156" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#e0e0e0" opacity="0.7">Each missed URL = lost</text>
    <text x="54" y="170" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#e0e0e0" opacity="0.7">backlink equity + authority.</text>
    <!-- Severity bar -->
    <rect x="54" y="190" width="180" height="6" rx="3" fill="#ef4444" opacity="0.15"/>
    <rect x="54" y="190" width="180" height="6" rx="3" fill="#ef4444"/>
    <text x="54" y="210" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#ef4444">Impact: 40-80% traffic loss</text>

    <!-- Card 2: Content -->
    <rect x="262" y="75" width="215" height="150" rx="10" fill="#111118"/>
    <rect x="262" y="75" width="215" height="3" rx="2" fill="#ef4444"/>
    <text x="280" y="102" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">Content Removed</text>
    <rect x="396" y="89" width="68" height="18" rx="4" fill="#ef4444" opacity="0.15"/>
    <text x="430" y="102" font-family="Arial, Helvetica, sans-serif" font-size="9" font-weight="bold" fill="#ef4444" text-anchor="middle">CRITICAL</text>
    <text x="280" y="122" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#e0e0e0" opacity="0.7">Removing paragraphs for</text>
    <text x="280" y="136" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#e0e0e0" opacity="0.7">"cleaner design" strips the</text>
    <text x="280" y="156" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#e0e0e0" opacity="0.7">keywords Google ranked.</text>
    <text x="280" y="170" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#e0e0e0" opacity="0.7">H1 rewrites change query match.</text>
    <!-- Severity bar -->
    <rect x="280" y="190" width="180" height="6" rx="3" fill="#ef4444" opacity="0.15"/>
    <rect x="280" y="190" width="162" height="6" rx="3" fill="#ef4444"/>
    <text x="280" y="210" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#ef4444">Impact: 30-60% traffic loss</text>

    <!-- Card 3: Internal Links -->
    <rect x="488" y="75" width="200" height="150" rx="10" fill="#111118"/>
    <rect x="488" y="75" width="200" height="3" rx="2" fill="#d79f1e"/>
    <text x="506" y="102" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">Internal Links</text>
    <rect x="614" y="89" width="58" height="18" rx="4" fill="#d79f1e" opacity="0.15"/>
    <text x="643" y="102" font-family="Arial, Helvetica, sans-serif" font-size="9" font-weight="bold" fill="#d79f1e" text-anchor="middle">HIGH</text>
    <text x="506" y="122" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#e0e0e0" opacity="0.7">Nav restructuring breaks</text>
    <text x="506" y="136" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#e0e0e0" opacity="0.7">link equity flow. Deep pages</text>
    <text x="506" y="156" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#e0e0e0" opacity="0.7">lose crawl priority.</text>
    <text x="506" y="170" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#e0e0e0" opacity="0.7">Orphaned pages drop fast.</text>
    <!-- Severity bar -->
    <rect x="506" y="190" width="165" height="6" rx="3" fill="#d79f1e" opacity="0.15"/>
    <rect x="506" y="190" width="124" height="6" rx="3" fill="#d79f1e"/>
    <text x="506" y="210" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#d79f1e">Impact: 20-40% traffic loss</text>

    <!-- Row 2 -->
    <!-- Card 4: Schema -->
    <rect x="36" y="240" width="215" height="150" rx="10" fill="#111118"/>
    <rect x="36" y="240" width="215" height="3" rx="2" fill="#d79f1e"/>
    <text x="54" y="267" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">Schema Stripped</text>
    <rect x="181" y="254" width="58" height="18" rx="4" fill="#d79f1e" opacity="0.15"/>
    <text x="210" y="267" font-family="Arial, Helvetica, sans-serif" font-size="9" font-weight="bold" fill="#d79f1e" text-anchor="middle">HIGH</text>
    <text x="54" y="287" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#e0e0e0" opacity="0.7">FAQ, HowTo, Product schema</text>
    <text x="54" y="301" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#e0e0e0" opacity="0.7">rarely survives CMS changes.</text>
    <text x="54" y="321" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#e0e0e0" opacity="0.7">Rich results disappear from</text>
    <text x="54" y="335" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#e0e0e0" opacity="0.7">SERPs, CTR drops 15-30%.</text>
    <!-- Severity bar -->
    <rect x="54" y="355" width="180" height="6" rx="3" fill="#d79f1e" opacity="0.15"/>
    <rect x="54" y="355" width="108" height="6" rx="3" fill="#d79f1e"/>
    <text x="54" y="375" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#d79f1e">Impact: 15-30% CTR loss</text>

    <!-- Card 5: Page Speed -->
    <rect x="262" y="240" width="215" height="150" rx="10" fill="#111118"/>
    <rect x="262" y="240" width="215" height="3" rx="2" fill="#d79f1e"/>
    <text x="280" y="267" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">Page Speed</text>
    <rect x="396" y="254" width="68" height="18" rx="4" fill="#d79f1e" opacity="0.15"/>
    <text x="430" y="267" font-family="Arial, Helvetica, sans-serif" font-size="9" font-weight="bold" fill="#d79f1e" text-anchor="middle">MEDIUM</text>
    <text x="280" y="287" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#e0e0e0" opacity="0.7">New designs load heavy assets:</text>
    <text x="280" y="301" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#e0e0e0" opacity="0.7">hero images, custom fonts,</text>
    <text x="280" y="321" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#e0e0e0" opacity="0.7">JS animation libraries. CWV</text>
    <text x="280" y="335" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#e0e0e0" opacity="0.7">regression triggers ranking drop.</text>
    <!-- Severity bar -->
    <rect x="280" y="355" width="180" height="6" rx="3" fill="#d79f1e" opacity="0.15"/>
    <rect x="280" y="355" width="90" height="6" rx="3" fill="#d79f1e"/>
    <text x="280" y="375" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#d79f1e">Impact: 10-25% traffic loss</text>

    <!-- Card 6: Redirects Lost -->
    <rect x="488" y="240" width="200" height="150" rx="10" fill="#111118"/>
    <rect x="488" y="240" width="200" height="3" rx="2" fill="#5B8AEF"/>
    <text x="506" y="267" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">Old Redirects Lost</text>
    <rect x="626" y="254" width="48" height="18" rx="4" fill="#5B8AEF" opacity="0.15"/>
    <text x="650" y="267" font-family="Arial, Helvetica, sans-serif" font-size="9" font-weight="bold" fill="#5B8AEF" text-anchor="middle">MED</text>
    <text x="506" y="287" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#e0e0e0" opacity="0.7">Previous redirect rules not</text>
    <text x="506" y="301" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#e0e0e0" opacity="0.7">carried to new platform.</text>
    <text x="506" y="321" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#e0e0e0" opacity="0.7">External backlinks to old URLs</text>
    <text x="506" y="335" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#e0e0e0" opacity="0.7">return 404. Link equity gone.</text>
    <!-- Severity bar -->
    <rect x="506" y="355" width="165" height="6" rx="3" fill="#5B8AEF" opacity="0.15"/>
    <rect x="506" y="355" width="82" height="6" rx="3" fill="#5B8AEF"/>
    <text x="506" y="375" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#5B8AEF">Impact: 10-20% traffic loss</text>

    <!-- Bottom -->
    <text x="360" y="410" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#e0e0e0" opacity="0.4" text-anchor="middle">sunnypatel.co.uk — Based on audit data from 44 managed websites</text>
  </g>
</svg>
