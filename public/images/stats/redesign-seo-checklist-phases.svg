<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" width="720" height="400">
  <defs>
    <clipPath id="clip-phases">
      <rect x="0" y="0" width="720" height="400" rx="16" ry="16"/>
    </clipPath>
  </defs>
  <g clip-path="url(#clip-phases)">
    <rect width="720" height="400" fill="#0a0a0f" rx="16" ry="16"/>

    <!-- Title -->
    <text x="36" y="38" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="bold" fill="#ffffff">Redesign SEO Checklist: Three Phases</text>
    <text x="36" y="56" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#e0e0e0" opacity="0.5">Key actions before, during, and after a website redesign to protect rankings</text>

    <!-- Timeline line -->
    <line x1="60" y1="85" x2="660" y2="85" stroke="#5B8AEF" stroke-width="2" stroke-opacity="0.3"/>
    <!-- Phase dots -->
    <circle cx="140" cy="85" r="8" fill="#5B8AEF"/>
    <circle cx="360" cy="85" r="8" fill="#d79f1e"/>
    <circle cx="580" cy="85" r="8" fill="#22c55e"/>
    <!-- Phase labels on timeline -->
    <text x="140" y="78" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="bold" fill="#5B8AEF" text-anchor="middle">BEFORE</text>
    <text x="360" y="78" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="bold" fill="#d79f1e" text-anchor="middle">DURING</text>
    <text x="580" y="78" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="bold" fill="#22c55e" text-anchor="middle">AFTER</text>

    <!-- Arrow markers -->
    <polygon points="656,82 664,85 656,88" fill="#5B8AEF" opacity="0.3"/>

    <!-- BEFORE card -->
    <rect x="36" y="105" width="210" height="270" rx="10" fill="#111118"/>
    <rect x="36" y="105" width="210" height="4" rx="2" fill="#5B8AEF"/>
    <text x="141" y="132" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" fill="#5B8AEF" text-anchor="middle">Phase 1: Baseline</text>
    <text x="141" y="147" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#e0e0e0" opacity="0.5" text-anchor="middle">2-3 days before launch</text>

    <!-- Before items -->
    <circle cx="56" cy="172" r="3" fill="#5B8AEF"/>
    <text x="66" y="176" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#e0e0e0">Export GSC traffic data</text>
    <circle cx="56" cy="197" r="3" fill="#5B8AEF"/>
    <text x="66" y="201" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#e0e0e0">Full site crawl (SF/Sitebulb)</text>
    <circle cx="56" cy="222" r="3" fill="#5B8AEF"/>
    <text x="66" y="226" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#e0e0e0">Map every URL redirect</text>
    <circle cx="56" cy="247" r="3" fill="#5B8AEF"/>
    <text x="66" y="251" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#e0e0e0">Document existing redirects</text>
    <circle cx="56" cy="272" r="3" fill="#5B8AEF"/>
    <text x="66" y="276" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#e0e0e0">Record Core Web Vitals</text>
    <circle cx="56" cy="297" r="3" fill="#5B8AEF"/>
    <text x="66" y="301" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#e0e0e0">List schema markup pages</text>
    <circle cx="56" cy="322" r="3" fill="#5B8AEF"/>
    <text x="66" y="326" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#e0e0e0">Screenshot sitemap (URL count)</text>

    <!-- Connector arrows -->
    <line x1="246" y1="240" x2="255" y2="240" stroke="#e0e0e0" stroke-width="1" stroke-opacity="0.2"/>
    <polygon points="253,237 259,240 253,243" fill="#e0e0e0" opacity="0.2"/>
    <line x1="466" y1="240" x2="475" y2="240" stroke="#e0e0e0" stroke-width="1" stroke-opacity="0.2"/>
    <polygon points="473,237 479,240 473,243" fill="#e0e0e0" opacity="0.2"/>

    <!-- DURING card -->
    <rect x="256" y="105" width="210" height="270" rx="10" fill="#111118"/>
    <rect x="256" y="105" width="210" height="4" rx="2" fill="#d79f1e"/>
    <text x="361" y="132" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" fill="#d79f1e" text-anchor="middle">Phase 2: Build + QA</text>
    <text x="361" y="147" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#e0e0e0" opacity="0.5" text-anchor="middle">During development</text>

    <!-- During items -->
    <circle cx="276" cy="172" r="3" fill="#d79f1e"/>
    <text x="286" y="176" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#e0e0e0">Canonical tags every page</text>
    <circle cx="276" cy="197" r="3" fill="#d79f1e"/>
    <text x="286" y="201" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#e0e0e0">XML sitemap generating</text>
    <circle cx="276" cy="222" r="3" fill="#d79f1e"/>
    <text x="286" y="226" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#e0e0e0">robots.txt not blocking new</text>
    <circle cx="276" cy="247" r="3" fill="#d79f1e"/>
    <text x="286" y="251" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#e0e0e0">Schema markup carried over</text>
    <circle cx="276" cy="272" r="3" fill="#d79f1e"/>
    <text x="286" y="276" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#e0e0e0">Meta titles/descriptions kept</text>
    <circle cx="276" cy="297" r="3" fill="#d79f1e"/>
    <text x="286" y="301" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#e0e0e0">Internal links use new URLs</text>
    <circle cx="276" cy="322" r="3" fill="#d79f1e"/>
    <text x="286" y="326" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#e0e0e0">Image alt text preserved</text>

    <!-- AFTER card -->
    <rect x="476" y="105" width="210" height="270" rx="10" fill="#111118"/>
    <rect x="476" y="105" width="210" height="4" rx="2" fill="#22c55e"/>
    <text x="581" y="132" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" fill="#22c55e" text-anchor="middle">Phase 3: Monitor</text>
    <text x="581" y="147" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#e0e0e0" opacity="0.5" text-anchor="middle">First 4 weeks post-launch</text>

    <!-- After items -->
    <circle cx="496" cy="172" r="3" fill="#22c55e"/>
    <text x="506" y="176" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#e0e0e0">Submit sitemap to GSC</text>
    <circle cx="496" cy="197" r="3" fill="#22c55e"/>
    <text x="506" y="201" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#e0e0e0">Test 20 random old URLs</text>
    <circle cx="496" cy="222" r="3" fill="#22c55e"/>
    <text x="506" y="226" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#e0e0e0">Verify Core Web Vitals</text>
    <circle cx="496" cy="247" r="3" fill="#22c55e"/>
    <text x="506" y="251" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#e0e0e0">Monitor indexed page count</text>
    <circle cx="496" cy="272" r="3" fill="#22c55e"/>
    <text x="506" y="276" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#e0e0e0">Track top 20 query positions</text>
    <circle cx="496" cy="297" r="3" fill="#22c55e"/>
    <text x="506" y="301" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#e0e0e0">Check crawl errors daily</text>
    <circle cx="496" cy="322" r="3" fill="#22c55e"/>
    <text x="506" y="326" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#e0e0e0">Compare CTR vs baseline</text>

    <!-- Bottom bar -->
    <text x="360" y="392" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#e0e0e0" opacity="0.4" text-anchor="middle">sunnypatel.co.uk — Website Redesign SEO Checklist</text>
  </g>
</svg>
