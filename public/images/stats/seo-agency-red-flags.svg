    <text x="72" y="142" fill="#ffffff" font-size="13" font-weight="bold">Domain Authority is the headline metric</text>
    <text x="72" y="158" fill="#e0e0e0" font-size="11" opacity="0.7">DA is not a Google ranking factor. It's a third-party estimate.</text>
