<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <clipPath id="outerClip1">
      <rect width="720" height="400" rx="16"/>
    </clipPath>
  </defs>
  <g clip-path="url(#outerClip1)">
    <rect width="720" height="400" fill="#0a0a0f" rx="16"/>
    <text x="360" y="36" fill="#ffffff" font-size="16" font-weight="bold" text-anchor="middle">What Your Agency Reports vs What GSC Actually Shows</text>
    <line x1="360" y1="52" x2="360" y2="370" stroke="#2a2a35" stroke-width="1" stroke-dasharray="4,4"/>
    <!-- Left column header -->
    <text x="180" y="66" fill="#ef4444" font-size="13" font-weight="bold" text-anchor="middle">Agency Report Says</text>
    <!-- Right column header -->
    <text x="540" y="66" fill="#22c55e" font-size="13" font-weight="bold" text-anchor="middle">GSC Actually Shows</text>
    <!-- Row 1 -->
    <rect x="20" y="82" width="320" height="52" fill="#111118" rx="10"/>
    <text x="36" y="103" fill="#ef4444" font-size="12" font-weight="bold">DA increased 15 → 22</text>
    <text x="36" y="122" fill="#e0e0e0" font-size="11" opacity="0.7">Not a Google metric. No ranking impact.</text>
    <rect x="380" y="82" width="320" height="52" fill="#111118" rx="10"/>
    <text x="396" y="103" fill="#22c55e" font-size="12" font-weight="bold">Non-brand clicks: +0% in 6 months</text>
    <text x="396" y="122" fill="#e0e0e0" font-size="11" opacity="0.7">Zero growth where it matters.</text>
    <!-- Row 2 -->
    <rect x="20" y="144" width="320" height="52" fill="#111118" rx="10"/>
    <text x="36" y="165" fill="#ef4444" font-size="12" font-weight="bold">"Ranking for 500 keywords"</text>
    <text x="36" y="184" fill="#e0e0e0" font-size="11" opacity="0.7">480 are brand terms or position 50+.</text>
    <rect x="380" y="144" width="320" height="52" fill="#111118" rx="10"/>
    <text x="396" y="165" fill="#22c55e" font-size="12" font-weight="bold">12 keywords in top 10 (non-brand)</text>
    <text x="396" y="184" fill="#e0e0e0" font-size="11" opacity="0.7">Only these drive real traffic.</text>
    <!-- Row 3 -->
    <rect x="20" y="206" width="320" height="52" fill="#111118" rx="10"/>
    <text x="36" y="227" fill="#ef4444" font-size="12" font-weight="bold">"50,000 impressions this month"</text>
    <text x="36" y="246" fill="#e0e0e0" font-size="11" opacity="0.7">Sounds impressive with no context.</text>
    <rect x="380" y="206" width="320" height="52" fill="#111118" rx="10"/>
    <text x="396" y="227" fill="#22c55e" font-size="12" font-weight="bold">200 clicks (0.4% CTR)</text>
    <text x="396" y="246" fill="#e0e0e0" font-size="11" opacity="0.7">Almost nobody actually clicked.</text>
    <!-- Row 4 -->
    <rect x="20" y="268" width="320" height="52" fill="#111118" rx="10"/>
    <text x="36" y="289" fill="#ef4444" font-size="12" font-weight="bold">"Traffic up 30% this quarter"</text>
    <text x="36" y="308" fill="#e0e0e0" font-size="11" opacity="0.7">Includes bot + brand + direct traffic.</text>
    <rect x="380" y="268" width="320" height="52" fill="#111118" rx="10"/>
    <text x="396" y="289" fill="#22c55e" font-size="12" font-weight="bold">Organic non-brand: down 8%</text>
    <text x="396" y="308" fill="#e0e0e0" font-size="11" opacity="0.7">SEO performance actually declined.</text>
    <!-- Row 5 -->
    <rect x="20" y="330" width="320" height="52" fill="#111118" rx="10"/>
    <text x="36" y="351" fill="#ef4444" font-size="12" font-weight="bold">"12 backlinks built"</text>
    <text x="36" y="370" fill="#e0e0e0" font-size="11" opacity="0.7">No URLs provided. No traffic on sources.</text>
    <rect x="380" y="330" width="320" height="52" fill="#111118" rx="10"/>
    <text x="396" y="351" fill="#22c55e" font-size="12" font-weight="bold">0 referring domains with real traffic</text>
    <text x="396" y="370" fill="#e0e0e0" font-size="11" opacity="0.7">Links are on spam sites or PBNs.</text>
  </g>
</svg>
