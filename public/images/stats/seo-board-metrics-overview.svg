<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" fill="none">
  <defs>
    <clipPath id="outerClip">
      <rect width="720" height="420" rx="16"/>
    </clipPath>
  </defs>
  <g clip-path="url(#outerClip)">
    <rect width="720" height="420" fill="#0a0a0f" rx="16"/>
    <text x="360" y="32" text-anchor="middle" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700">5 SEO Metrics Your Board Should See</text>
    <text x="360" y="50" text-anchor="middle" fill="#e0e0e0" font-family="Arial, Helvetica, sans-serif" font-size="10" opacity="0.6">Healthy vs unhealthy signals — monthly board report</text>

    <!-- Card 1: Non-Brand Traffic -->
    <rect x="16" y="66" width="218" height="100" rx="10" fill="#111118"/>
    <text x="125" y="86" text-anchor="middle" fill="#5B8AEF" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="700">NON-BRAND TRAFFIC</text>
    <text x="80" y="114" text-anchor="middle" fill="#22c55e" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">+5.5%</text>
    <text x="80" y="130" text-anchor="middle" fill="#e0e0e0" font-family="Arial, Helvetica, sans-serif" font-size="9" opacity="0.7">12,450 visits</text>
    <text x="175" y="114" text-anchor="middle" fill="#ef4444" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">-3.2%</text>
    <text x="175" y="130" text-anchor="middle" fill="#e0e0e0" font-family="Arial, Helvetica, sans-serif" font-size="9" opacity="0.7">6,100 visits</text>
    <rect x="40" y="140" width="60" height="4" rx="2" fill="#22c55e"/>
    <text x="70" y="155" text-anchor="middle" fill="#22c55e" font-family="Arial, Helvetica, sans-serif" font-size="8">HEALTHY</text>
    <rect x="140" y="140" width="60" height="4" rx="2" fill="#ef4444"/>
    <text x="170" y="155" text-anchor="middle" fill="#ef4444" font-family="Arial, Helvetica, sans-serif" font-size="8">UNHEALTHY</text>

    <!-- Card 2: Revenue Per Visit -->
    <rect x="251" y="66" width="218" height="100" rx="10" fill="#111118"/>
    <text x="360" y="86" text-anchor="middle" fill="#5B8AEF" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="700">REVENUE PER VISIT</text>
    <text x="315" y="114" text-anchor="middle" fill="#22c55e" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">£2.34</text>
    <text x="315" y="130" text-anchor="middle" fill="#e0e0e0" font-family="Arial, Helvetica, sans-serif" font-size="9" opacity="0.7">+7.3% MoM</text>
    <text x="405" y="114" text-anchor="middle" fill="#ef4444" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">£0.18</text>
    <text x="405" y="130" text-anchor="middle" fill="#e0e0e0" font-family="Arial, Helvetica, sans-serif" font-size="9" opacity="0.7">-12% MoM</text>
    <rect x="275" y="140" width="60" height="4" rx="2" fill="#22c55e"/>
    <text x="305" y="155" text-anchor="middle" fill="#22c55e" font-family="Arial, Helvetica, sans-serif" font-size="8">HEALTHY</text>
    <rect x="375" y="140" width="60" height="4" rx="2" fill="#ef4444"/>
    <text x="405" y="155" text-anchor="middle" fill="#ef4444" font-family="Arial, Helvetica, sans-serif" font-size="8">UNHEALTHY</text>

    <!-- Card 3: Page Quality Ratio -->
    <rect x="486" y="66" width="218" height="100" rx="10" fill="#111118"/>
    <text x="595" y="86" text-anchor="middle" fill="#5B8AEF" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="700">PAGE QUALITY RATIO</text>
    <text x="550" y="114" text-anchor="middle" fill="#22c55e" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">34%</text>
    <text x="550" y="130" text-anchor="middle" fill="#e0e0e0" font-family="Arial, Helvetica, sans-serif" font-size="9" opacity="0.7">170/500 pages click</text>
    <text x="640" y="114" text-anchor="middle" fill="#ef4444" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">8%</text>
    <text x="640" y="130" text-anchor="middle" fill="#e0e0e0" font-family="Arial, Helvetica, sans-serif" font-size="9" opacity="0.7">40/500 pages click</text>
    <rect x="510" y="140" width="60" height="4" rx="2" fill="#22c55e"/>
    <text x="540" y="155" text-anchor="middle" fill="#22c55e" font-family="Arial, Helvetica, sans-serif" font-size="8">HEALTHY</text>
    <rect x="610" y="140" width="60" height="4" rx="2" fill="#ef4444"/>
    <text x="640" y="155" text-anchor="middle" fill="#ef4444" font-family="Arial, Helvetica, sans-serif" font-size="8">UNHEALTHY</text>

    <!-- Card 4: Query Diversity -->
    <rect x="133" y="182" width="218" height="100" rx="10" fill="#111118"/>
    <text x="242" y="202" text-anchor="middle" fill="#5B8AEF" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="700">QUERY DIVERSITY SCORE</text>
    <text x="197" y="230" text-anchor="middle" fill="#22c55e" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">1.8</text>
    <text x="197" y="246" text-anchor="middle" fill="#e0e0e0" font-family="Arial, Helvetica, sans-serif" font-size="9" opacity="0.7">900 queries / 500 pgs</text>
    <text x="287" y="230" text-anchor="middle" fill="#ef4444" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">0.3</text>
    <text x="287" y="246" text-anchor="middle" fill="#e0e0e0" font-family="Arial, Helvetica, sans-serif" font-size="9" opacity="0.7">150 queries / 500 pgs</text>
    <rect x="157" y="256" width="60" height="4" rx="2" fill="#22c55e"/>
    <text x="187" y="271" text-anchor="middle" fill="#22c55e" font-family="Arial, Helvetica, sans-serif" font-size="8">HEALTHY</text>
    <rect x="257" y="256" width="60" height="4" rx="2" fill="#ef4444"/>
    <text x="287" y="271" text-anchor="middle" fill="#ef4444" font-family="Arial, Helvetica, sans-serif" font-size="8">UNHEALTHY</text>

    <!-- Card 5: CTR by Position -->
    <rect x="369" y="182" width="218" height="100" rx="10" fill="#111118"/>
    <text x="478" y="202" text-anchor="middle" fill="#5B8AEF" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="700">CTR — POSITIONS 1-3</text>
    <text x="433" y="230" text-anchor="middle" fill="#22c55e" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">22%</text>
    <text x="433" y="246" text-anchor="middle" fill="#e0e0e0" font-family="Arial, Helvetica, sans-serif" font-size="9" opacity="0.7">Above 15% benchmark</text>
    <text x="523" y="230" text-anchor="middle" fill="#ef4444" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">4%</text>
    <text x="523" y="246" text-anchor="middle" fill="#e0e0e0" font-family="Arial, Helvetica, sans-serif" font-size="9" opacity="0.7">Below 15% benchmark</text>
    <rect x="393" y="256" width="60" height="4" rx="2" fill="#22c55e"/>
    <text x="423" y="271" text-anchor="middle" fill="#22c55e" font-family="Arial, Helvetica, sans-serif" font-size="8">HEALTHY</text>
    <rect x="493" y="256" width="60" height="4" rx="2" fill="#ef4444"/>
    <text x="523" y="271" text-anchor="middle" fill="#ef4444" font-family="Arial, Helvetica, sans-serif" font-size="8">UNHEALTHY</text>

    <!-- Bottom bar -->
    <rect x="16" y="300" width="688" height="48" rx="10" fill="#111118"/>
    <text x="360" y="320" text-anchor="middle" fill="#d79f1e" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="700">BOARD REPORT RULE</text>
    <text x="360" y="336" text-anchor="middle" fill="#e0e0e0" font-family="Arial, Helvetica, sans-serif" font-size="10" opacity="0.8">Green = improving | Amber = flat | Red = declining — one sentence of context per metric, one action item</text>

    <!-- Source -->
    <text x="360" y="370" text-anchor="middle" fill="#e0e0e0" font-family="Arial, Helvetica, sans-serif" font-size="9" opacity="0.4">Source: Portfolio data from 44 sites, 28-day GSC periods — sunnypatel.co.uk</text>
  </g>
</svg>