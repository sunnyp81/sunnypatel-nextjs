<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" width="720" height="420">
  <defs>
    <clipPath id="clip-defensibility">
      <rect x="0" y="0" width="720" height="420" rx="16" ry="16"/>
    </clipPath>
  </defs>
  <g clip-path="url(#clip-defensibility)">
    <rect width="720" height="420" fill="#0a0a0f" rx="16" ry="16"/>

    <!-- Title -->
    <text x="36" y="38" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="bold" fill="#ffffff">SEO Traffic Defensibility: Fragile vs Resilient</text>
    <text x="36" y="56" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#e0e0e0" opacity="0.5">How to tell if organic traffic will survive an algorithm update</text>

    <!-- Column headers -->
    <text x="56" y="90" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold" fill="#e0e0e0">Signal</text>
    <text x="340" y="90" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold" fill="#ef4444">Fragile</text>
    <text x="556" y="90" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold" fill="#22c55e">Resilient</text>

    <!-- Divider -->
    <line x1="36" y1="100" x2="684" y2="100" stroke="#333" stroke-width="0.5"/>

    <!-- Row 1: Query Diversity -->
    <rect x="36" y="110" width="648" height="54" rx="8" fill="#111118"/>
    <text x="56" y="134" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#e0e0e0">Query diversity</text>
    <text x="56" y="150" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#e0e0e0" opacity="0.4">How many queries drive traffic</text>

    <!-- Fragile bar -->
    <rect x="340" y="122" width="160" height="16" rx="4" fill="#0a0a0f"/>
    <rect x="340" y="122" width="24" height="16" rx="4" fill="#ef4444" opacity="0.8"/>
    <text x="370" y="134" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ef4444">8 queries = 70%</text>

    <!-- Resilient bar -->
    <rect x="556" y="122" width="120" height="16" rx="4" fill="#0a0a0f"/>
    <rect x="556" y="122" width="108" height="16" rx="4" fill="#22c55e" opacity="0.5"/>
    <text x="570" y="134" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#22c55e">2,400+ queries</text>

    <!-- Row 2: Referring Domains -->
    <rect x="36" y="172" width="648" height="54" rx="8" fill="#111118"/>
    <text x="56" y="196" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#e0e0e0">Referring domains</text>
    <text x="56" y="212" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#e0e0e0" opacity="0.4">Backlink source diversity</text>

    <rect x="340" y="184" width="160" height="16" rx="4" fill="#0a0a0f"/>
    <rect x="340" y="184" width="32" height="16" rx="4" fill="#ef4444" opacity="0.8"/>
    <text x="378" y="196" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ef4444">12 domains</text>

    <rect x="556" y="184" width="120" height="16" rx="4" fill="#0a0a0f"/>
    <rect x="556" y="184" width="96" height="16" rx="4" fill="#22c55e" opacity="0.5"/>
    <text x="570" y="196" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#22c55e">180+ domains</text>

    <!-- Row 3: Content Depth -->
    <rect x="36" y="234" width="648" height="54" rx="8" fill="#111118"/>
    <text x="56" y="258" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#e0e0e0">Topical coverage</text>
    <text x="56" y="274" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#e0e0e0" opacity="0.4">Content depth in primary topic</text>

    <rect x="340" y="246" width="160" height="16" rx="4" fill="#0a0a0f"/>
    <rect x="340" y="246" width="20" height="16" rx="4" fill="#ef4444" opacity="0.8"/>
    <text x="366" y="258" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ef4444">6 thin pages</text>

    <rect x="556" y="246" width="120" height="16" rx="4" fill="#0a0a0f"/>
    <rect x="556" y="246" width="84" height="16" rx="4" fill="#22c55e" opacity="0.5"/>
    <text x="570" y="258" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#22c55e">85+ deep guides</text>

    <!-- Row 4: Traffic Concentration -->
    <rect x="36" y="296" width="648" height="54" rx="8" fill="#111118"/>
    <text x="56" y="320" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#e0e0e0">Page concentration</text>
    <text x="56" y="336" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#e0e0e0" opacity="0.4">% of traffic from top page</text>

    <rect x="340" y="308" width="160" height="16" rx="4" fill="#0a0a0f"/>
    <rect x="340" y="308" width="112" height="16" rx="4" fill="#ef4444" opacity="0.8"/>
    <text x="370" y="320" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ef4444">72% from 1 page</text>

    <rect x="556" y="308" width="120" height="16" rx="4" fill="#0a0a0f"/>
    <rect x="556" y="308" width="14" height="16" rx="4" fill="#22c55e" opacity="0.5"/>
    <text x="576" y="320" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#22c55e">8% from top page</text>

    <!-- Bottom verdict -->
    <rect x="36" y="366" width="310" height="38" rx="8" fill="#111118" stroke="#ef4444" stroke-opacity="0.3" stroke-width="1"/>
    <text x="56" y="389" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold" fill="#ef4444">Fragile: one update away from collapse</text>

    <rect x="380" y="366" width="304" height="38" rx="8" fill="#111118" stroke="#22c55e" stroke-opacity="0.3" stroke-width="1"/>
    <text x="400" y="389" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold" fill="#22c55e">Resilient: survives algorithm shifts</text>
  </g>
</svg>
