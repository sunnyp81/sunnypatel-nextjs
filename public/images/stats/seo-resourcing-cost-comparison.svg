  <text x="200" y="393" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#aabbdd" text-anchor="middle">Scale execution</text>
  <text x="200" y="408" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#aabbdd" text-anchor="middle">post-traction</text>
  <text x="400" y="393" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#aabbdd" text-anchor="middle">Multi-channel or</text>
  <text x="400" y="408" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#aabbdd" text-anchor="middle">enterprise clients</text>
  <text x="600" y="393" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#aabbdd" text-anchor="middle">Strategy-first, growth</text>
  <text x="600" y="408" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#aabbdd" text-anchor="middle">stage or portfolio cos</text>

  <!-- Column separator lines -->
