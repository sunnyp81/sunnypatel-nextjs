  <line x1="500" y1="80" x2="500" y2="430" stroke="#1a1a2e" stroke-width="1"/>

  <!-- Footer note -->
  <text x="400" y="445" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#555566" text-anchor="middle">sunnypatel.co.uk — UK market rates 2026 — dots = rating out of 5</text>
