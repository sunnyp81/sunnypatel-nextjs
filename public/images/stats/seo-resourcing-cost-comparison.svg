  <circle cx="192" cy="301" r="5" fill="#5B8AEF" opacity="0.9"/>
  <circle cx="206" cy="301" r="5" fill="#222233"/>
  <circle cx="220" cy="301" r="5" fill="#222233"/>
  <circle cx="234" cy="301" r="5" fill="#222233"/>
  <!-- Agency: 3/5 -->
  <circle cx="378" cy="301" r="5" fill="#5B8AEF" opacity="0.9"/>
  <circle cx="392" cy="301" r="5" fill="#5B8AEF" opacity="0.9"/>
  <circle cx="406" cy="301" r="5" fill="#5B8AEF" opacity="0.9"/>
  <circle cx="420" cy="301" r="5" fill="#222233"/>
  <circle cx="434" cy="301" r="5" fill="#222233"/>
  <!-- Consultant: 5/5 -->
  <circle cx="578" cy="301" r="5" fill="#5B8AEF" opacity="0.9"/>
  <circle cx="592" cy="301" r="5" fill="#5B8AEF" opacity="0.9"/>
  <circle cx="606" cy="301" r="5" fill="#5B8AEF" opacity="0.9"/>
  <circle cx="620" cy="301" r="5" fill="#5B8AEF" opacity="0.9"/>
  <circle cx="634" cy="301" r="5" fill="#5B8AEF" opacity="0.9"/>

