  <!-- range indicator lighter part -->
  <rect x="120" y="135" width="88" height="18" rx="3" fill="#5B8AEF"/>
  <text x="270" y="148" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#ccddff" text-anchor="end">£44K–£71K</text>

  <!-- Agency bar: £18K-£60K, max = £60K of £80K = 75% -->
  <rect x="320" y="135" width="120" height="18" rx="3" fill="#5B8AEF" opacity="0.85"/>
  <rect x="320" y="135" width="36" height="18" rx="3" fill="#5B8AEF"/>
  <text x="470" y="148" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#ccddff" text-anchor="end">£18K–£60K</text>

  <!-- Consultant bar: £12K-£48K, max = £48K of £80K = 60% -->
  <rect x="520" y="135" width="96" height="18" rx="3" fill="#5B8AEF" opacity="0.85"/>
  <rect x="520" y="135" width="24" height="18" rx="3" fill="#5B8AEF"/>
  <text x="670" y="148" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#ccddff" text-anchor="end">£12K–£48K</text>

