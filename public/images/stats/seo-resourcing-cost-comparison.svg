  <circle cx="592" cy="211" r="5" fill="#5B8AEF" opacity="0.9"/>
  <circle cx="606" cy="211" r="5" fill="#5B8AEF" opacity="0.9"/>
  <circle cx="620" cy="211" r="5" fill="#5B8AEF" opacity="0.9"/>
  <circle cx="634" cy="211" r="5" fill="#5B8AEF" opacity="0.9"/>

