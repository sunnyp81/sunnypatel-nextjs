  <circle cx="192" cy="331" r="5" fill="#5B8AEF" opacity="0.9"/>
  <circle cx="206" cy="331" r="5" fill="#222233"/>
  <circle cx="220" cy="331" r="5" fill="#222233"/>
  <circle cx="234" cy="331" r="5" fill="#222233"/>
  <!-- Agency: 5/5 -->
  <circle cx="378" cy="331" r="5" fill="#5B8AEF" opacity="0.9"/>
  <circle cx="392" cy="331" r="5" fill="#5B8AEF" opacity="0.9"/>
  <circle cx="406" cy="331" r="5" fill="#5B8AEF" opacity="0.9"/>
  <circle cx="420" cy="331" r="5" fill="#5B8AEF" opacity="0.9"/>
  <circle cx="434" cy="331" r="5" fill="#5B8AEF" opacity="0.9"/>
  <!-- Consultant: 4/5 -->
  <circle cx="578" cy="331" r="5" fill="#5B8AEF" opacity="0.9"/>
  <circle cx="592" cy="331" r="5" fill="#5B8AEF" opacity="0.9"/>
  <circle cx="606" cy="331" r="5" fill="#5B8AEF" opacity="0.9"/>
  <circle cx="620" cy="331" r="5" fill="#5B8AEF" opacity="0.9"/>
  <circle cx="634" cy="331" r="5" fill="#222233"/>

  <!-- Divider -->
