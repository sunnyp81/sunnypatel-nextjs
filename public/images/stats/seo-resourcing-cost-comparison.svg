  <!-- In-house: 3/5 -->
  <circle cx="178" cy="211" r="5" fill="#5B8AEF" opacity="0.9"/>
  <circle cx="192" cy="211" r="5" fill="#5B8AEF" opacity="0.9"/>
  <circle cx="206" cy="211" r="5" fill="#5B8AEF" opacity="0.9"/>
  <circle cx="220" cy="211" r="5" fill="#222233"/>
  <circle cx="234" cy="211" r="5" fill="#222233"/>
