<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450" role="img" aria-label="SEO resourcing cost comparison: in-house, agency, consultant">
  <rect width="800" height="450" fill="#0a0a0f"/>

  <!-- Title -->
  <text x="400" y="38" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#ffffff" text-anchor="middle">SEO Resourcing: Annual Cost &amp; Capability Comparison</text>
  <text x="400" y="58" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#888899" text-anchor="middle">UK market rates, 2026</text>

  <!-- Column headers -->
  <text x="200" y="92" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#5B8AEF" text-anchor="middle">In-House</text>
  <text x="400" y="92" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#5B8AEF" text-anchor="middle">Agency</text>
  <text x="600" y="92" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#5B8AEF" text-anchor="middle">Consultant</text>

  <!-- Divider -->
  <line x1="40" y1="100" x2="760" y2="100" stroke="#222233" stroke-width="1"/>

  <!-- Cost bars section label -->
  <text x="40" y="126" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#888899" font-weight="600">ANNUAL COST (£)</text>

  <!-- Bar chart background tracks -->
  <rect x="120" y="135" width="160" height="18" rx="3" fill="#1a1a2e"/>
  <rect x="320" y="135" width="160" height="18" rx="3" fill="#1a1a2e"/>
  <rect x="520" y="135" width="160" height="18" rx="3" fill="#1a1a2e"/>

  <!-- In-house bar: £44K-£71K, show max ~£71K of £80K scale = 89% -->
