  <circle cx="178" cy="241" r="5" fill="#5B8AEF" opacity="0.9"/>
  <circle cx="192" cy="241" r="5" fill="#5B8AEF" opacity="0.9"/>
  <circle cx="206" cy="241" r="5" fill="#5B8AEF" opacity="0.9"/>
  <circle cx="220" cy="241" r="5" fill="#5B8AEF" opacity="0.9"/>
  <circle cx="234" cy="241" r="5" fill="#5B8AEF" opacity="0.9"/>
  <!-- Agency: 5/5 -->
  <circle cx="378" cy="241" r="5" fill="#5B8AEF" opacity="0.9"/>
