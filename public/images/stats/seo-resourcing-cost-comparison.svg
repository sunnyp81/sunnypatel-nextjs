  <circle cx="592" cy="271" r="5" fill="#5B8AEF" opacity="0.9"/>
  <circle cx="606" cy="271" r="5" fill="#5B8AEF" opacity="0.9"/>
  <circle cx="620" cy="271" r="5" fill="#5B8AEF" opacity="0.9"/>
