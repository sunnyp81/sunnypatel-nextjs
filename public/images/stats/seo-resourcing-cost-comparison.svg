  <circle cx="406" cy="241" r="5" fill="#5B8AEF" opacity="0.9"/>
  <circle cx="420" cy="241" r="5" fill="#5B8AEF" opacity="0.9"/>
  <circle cx="434" cy="241" r="5" fill="#5B8AEF" opacity="0.9"/>
