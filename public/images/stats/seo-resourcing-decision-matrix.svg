<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450" role="img" aria-label="SEO resourcing decision matrix — which model fits which business stage">
  <rect width="800" height="450" fill="#0a0a0f"/>

  <!-- Title -->
  <text x="400" y="36" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#ffffff" text-anchor="middle">SEO Resourcing Decision Matrix</text>
  <text x="400" y="56" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#888899" text-anchor="middle">Match your business stage and budget to the right model</text>

  <!-- Y-axis label -->
  <text x="22" y="270" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#888899" text-anchor="middle" transform="rotate(-90 22 270)">Monthly organic revenue</text>

  <!-- X-axis label -->
  <text x="460" y="440" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#888899" text-anchor="middle">Team size / internal SEO capability</text>

  <!-- Grid -->
  <!-- Columns: None | Junior | Mid | Senior -->
  <!-- Rows: £0-10K | £10K-50K | £50K-150K | £150K+ -->

  <!-- Grid outer border -->
  <rect x="80" y="75" width="680" height="340" rx="4" fill="none" stroke="#222233" stroke-width="1"/>

  <!-- Column lines -->
  <line x1="250" y1="75" x2="250" y2="415" stroke="#222233" stroke-width="1"/>
  <line x1="420" y1="75" x2="420" y2="415" stroke="#222233" stroke-width="1"/>
  <line x1="590" y1="75" x2="590" y2="415" stroke="#222233" stroke-width="1"/>

  <!-- Row lines -->
  <line x1="80" y1="160" x2="760" y2="160" stroke="#222233" stroke-width="1"/>
  <line x1="80" y1="245" x2="760" y2="245" stroke="#222233" stroke-width="1"/>
  <line x1="80" y1="330" x2="760" y2="330" stroke="#222233" stroke-width="1"/>

  <!-- Column headers -->
  <text x="165" y="95" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#888899" text-anchor="middle">No SEO resource</text>
  <text x="335" y="95" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#888899" text-anchor="middle">Junior in-house</text>
  <text x="505" y="95" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#888899" text-anchor="middle">Mid-level in-house</text>
  <text x="675" y="95" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#888899" text-anchor="middle">Senior in-house</text>

  <!-- Row headers -->
  <text x="80" y="122" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#888899" text-anchor="middle" transform="rotate(-45 80 122)">£150K+/mo</text>
  <text x="80" y="207" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#888899" text-anchor="end">£50K–150K</text>
  <text x="80" y="292" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#888899" text-anchor="end">£10K–50K</text>
  <text x="80" y="377" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#888899" text-anchor="end">Under £10K</text>

  <!-- CELL FILLS -->

  <!-- Row 4 (Under £10K): No resource = Consultant | Junior = Consultant | Mid = N/A | Senior = N/A -->
  <rect x="81" y="331" width="168" height="83" rx="0" fill="#5B8AEF" opacity="0.18"/>
  <rect x="251" y="331" width="168" height="83" rx="0" fill="#5B8AEF" opacity="0.18"/>
  <rect x="421" y="331" width="168" height="83" rx="0" fill="#222233" opacity="0.4"/>
  <rect x="591" y="331" width="168" height="83" rx="0" fill="#222233" opacity="0.4"/>

  <!-- Row 3 (£10K-50K): No resource = Consultant | Junior = Hybrid | Mid = Agency/Hybrid | Senior = In-house OK -->
  <rect x="81" y="246" width="168" height="83" rx="0" fill="#5B8AEF" opacity="0.25"/>
  <rect x="251" y="246" width="168" height="83" rx="0" fill="#7B6AEF" opacity="0.25"/>
  <rect x="421" y="246" width="168" height="83" rx="0" fill="#EF8A5B" opacity="0.18"/>
  <rect x="591" y="246" width="168" height="83" rx="0" fill="#222233" opacity="0.2"/>

  <!-- Row 2 (£50K-150K): No resource = Consultant | Junior = Hybrid | Mid = Hybrid | Senior = In-house -->
  <rect x="81" y="161" width="168" height="83" rx="0" fill="#5B8AEF" opacity="0.3"/>
  <rect x="251" y="161" width="168" height="83" rx="0" fill="#7B6AEF" opacity="0.35"/>
  <rect x="421" y="161" width="168" height="83" rx="0" fill="#7B6AEF" opacity="0.35"/>
  <rect x="591" y="161" width="168" height="83" rx="0" fill="#3BAF7A" opacity="0.25"/>

  <!-- Row 1 (£150K+): No resource = URGENT hire | Junior = Hybrid | Mid = In-house lead | Senior = In-house -->
  <rect x="81" y="76" width="168" height="83" rx="0" fill="#EF5B5B" opacity="0.2"/>
  <rect x="251" y="76" width="168" height="83" rx="0" fill="#7B6AEF" opacity="0.35"/>
  <rect x="421" y="76" width="168" height="83" rx="0" fill="#3BAF7A" opacity="0.2"/>
  <rect x="591" y="76" width="168" height="83" rx="0" fill="#3BAF7A" opacity="0.35"/>

  <!-- CELL TEXT -->

  <!-- Row 4 Under £10K -->
  <text x="165" y="366" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#5B8AEF" text-anchor="middle">Consultant</text>
  <text x="165" y="382" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#aabbcc" text-anchor="middle">1–2 days/mo</text>
  <text x="165" y="397" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#aabbcc" text-anchor="middle">£500–1,500/mo</text>

  <text x="335" y="366" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#5B8AEF" text-anchor="middle">Consultant</text>
  <text x="335" y="382" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#aabbcc" text-anchor="middle">strategy direction</text>
  <text x="335" y="397" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#aabbcc" text-anchor="middle">+ exec support</text>

  <text x="505" y="372" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#555566" text-anchor="middle">Premature</text>
  <text x="505" y="388" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#444455" text-anchor="middle">reduce overhead first</text>

  <text x="675" y="372" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#555566" text-anchor="middle">Premature</text>
  <text x="675" y="388" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#444455" text-anchor="middle">significant overinvestment</text>

  <!-- Row 3 £10K–50K -->
  <text x="165" y="279" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#5B8AEF" text-anchor="middle">Consultant</text>
  <text x="165" y="295" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#aabbcc" text-anchor="middle">2–4 days/mo</text>
  <text x="165" y="310" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#aabbcc" text-anchor="middle">or agency £2K/mo</text>

  <text x="335" y="279" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#9988EF" text-anchor="middle">Hybrid</text>
  <text x="335" y="295" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#aabbcc" text-anchor="middle">consultant strategy</text>
  <text x="335" y="310" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#aabbcc" text-anchor="middle">+ junior execution</text>

  <text x="505" y="279" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#EF9A6A" text-anchor="middle">Agency</text>
  <text x="505" y="295" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#aabbcc" text-anchor="middle">or strong hybrid</text>
  <text x="505" y="310" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#aabbcc" text-anchor="middle">£2–3K retainer</text>

  <text x="675" y="279" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#aabbcc" text-anchor="middle">In-house</text>
  <text x="675" y="295" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#aabbcc" text-anchor="middle">self-sufficient but</text>
  <text x="675" y="310" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#aabbcc" text-anchor="middle">watch silo risk</text>

  <!-- Row 2 £50K–150K -->
  <text x="165" y="194" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#5B8AEF" text-anchor="middle">Consultant</text>
  <text x="165" y="210" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#aabbcc" text-anchor="middle">urgent — you're</text>
  <text x="165" y="225" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#aabbcc" text-anchor="middle">leaving growth unmanaged</text>

  <text x="335" y="194" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#9988EF" text-anchor="middle">Hybrid</text>
  <text x="335" y="210" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#aabbcc" text-anchor="middle">consultant + junior</text>
  <text x="335" y="225" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#aabbcc" text-anchor="middle">best ROI at this stage</text>

  <text x="505" y="194" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#9988EF" text-anchor="middle">Hybrid</text>
  <text x="505" y="210" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#aabbcc" text-anchor="middle">mid-hire + consultant</text>
  <text x="505" y="225" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#aabbcc" text-anchor="middle">oversight 2 days/mo</text>

  <text x="675" y="194" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#6BCF9A" text-anchor="middle">In-House</text>
  <text x="675" y="210" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#aabbcc" text-anchor="middle">senior lead, good</text>
  <text x="675" y="225" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#aabbcc" text-anchor="middle">annual consultant review</text>

  <!-- Row 1 £150K+ -->
  <text x="165" y="109" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#EF6B6B" text-anchor="middle">Hire urgently</text>
  <text x="165" y="125" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#aabbcc" text-anchor="middle">SEO gap = revenue</text>
  <text x="165" y="140" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#aabbcc" text-anchor="middle">risk at this scale</text>

  <text x="335" y="109" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#9988EF" text-anchor="middle">Hybrid</text>
  <text x="335" y="125" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#aabbcc" text-anchor="middle">promote + consultant</text>
  <text x="335" y="140" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#aabbcc" text-anchor="middle">interim strategy</text>

  <text x="505" y="109" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#6BCF9A" text-anchor="middle">In-House Lead</text>
  <text x="505" y="125" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#aabbcc" text-anchor="middle">dedicated channel</text>
  <text x="505" y="140" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#aabbcc" text-anchor="middle">ownership justified</text>

  <text x="675" y="109" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#6BCF9A" text-anchor="middle">In-House Team</text>
  <text x="675" y="125" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#aabbcc" text-anchor="middle">full function, consider</text>
  <text x="675" y="140" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#aabbcc" text-anchor="middle">agency for link acquisition</text>

  <!-- Legend -->
  <rect x="80" y="422" width="12" height="10" rx="2" fill="#5B8AEF" opacity="0.6"/>
  <text x="97" y="431" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#888899">Consultant</text>
  <rect x="175" y="422" width="12" height="10" rx="2" fill="#9988EF" opacity="0.6"/>
  <text x="192" y="431" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#888899">Hybrid</text>
  <rect x="245" y="422" width="12" height="10" rx="2" fill="#6BCF9A" opacity="0.6"/>
  <text x="262" y="431" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#888899">In-House</text>
  <rect x="330" y="422" width="12" height="10" rx="2" fill="#EF9A6A" opacity="0.6"/>
  <text x="347" y="431" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#888899">Agency</text>
  <rect x="405" y="422" width="12" height="10" rx="2" fill="#EF5B5B" opacity="0.6"/>
  <text x="422" y="431" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#888899">Risk / urgent action</text>
  <text x="760" y="431" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#444455" text-anchor="end">sunnypatel.co.uk</text>
</svg>
