<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" width="720" height="400">
  <defs>
    <clipPath id="roundedClip1">
      <rect width="720" height="400" rx="16" ry="16"/>
    </clipPath>
    <filter id="cardShadow1">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <g clip-path="url(#roundedClip1)">
    <!-- Background -->
    <rect width="720" height="400" rx="16" ry="16" fill="#0a0a0f"/>

    <!-- Title -->
    <text x="36" y="36" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="bold" fill="#ffffff">12-Month Cost Comparison: SEO vs Paid Ads</text>
    <text x="36" y="54" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#e0e0e0" opacity="0.5">Based on £3,000/month spend — B2B SaaS, £8.50 avg CPC</text>

    <!-- Chart area card -->
    <rect x="36" y="68" width="648" height="290" rx="10" ry="10" fill="#111118" filter="url(#cardShadow1)"/>

    <!-- Y-axis labels (monthly clicks) -->
    <text x="52" y="92" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#e0e0e0" opacity="0.5">Clicks/mo</text>
    <text x="52" y="114" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#e0e0e0" opacity="0.4">4,000</text>
    <text x="52" y="164" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#e0e0e0" opacity="0.4">3,000</text>
    <text x="52" y="214" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#e0e0e0" opacity="0.4">2,000</text>
    <text x="52" y="264" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#e0e0e0" opacity="0.4">1,000</text>
    <text x="52" y="314" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#e0e0e0" opacity="0.4">0</text>

    <!-- Grid lines -->
    <line x1="90" y1="110" x2="660" y2="110" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
    <line x1="90" y1="160" x2="660" y2="160" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
    <line x1="90" y1="210" x2="660" y2="210" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
    <line x1="90" y1="260" x2="660" y2="260" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
    <line x1="90" y1="310" x2="660" y2="310" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>

    <!-- X-axis month labels -->
    <text x="102" y="336" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#e0e0e0" opacity="0.5" text-anchor="middle">M1</text>
    <text x="149" y="336" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#e0e0e0" opacity="0.5" text-anchor="middle">M2</text>
    <text x="196" y="336" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#e0e0e0" opacity="0.5" text-anchor="middle">M3</text>
    <text x="243" y="336" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#e0e0e0" opacity="0.5" text-anchor="middle">M4</text>
    <text x="290" y="336" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#e0e0e0" opacity="0.5" text-anchor="middle">M5</text>
    <text x="337" y="336" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#e0e0e0" opacity="0.5" text-anchor="middle">M6</text>
    <text x="384" y="336" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#e0e0e0" opacity="0.5" text-anchor="middle">M7</text>
    <text x="431" y="336" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#e0e0e0" opacity="0.5" text-anchor="middle">M8</text>
    <text x="478" y="336" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#e0e0e0" opacity="0.5" text-anchor="middle">M9</text>
    <text x="525" y="336" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#e0e0e0" opacity="0.5" text-anchor="middle">M10</text>
    <text x="572" y="336" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#e0e0e0" opacity="0.5" text-anchor="middle">M11</text>
    <text x="619" y="336" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#e0e0e0" opacity="0.5" text-anchor="middle">M12</text>

    <!-- Paid line (flat ~353 clicks/month = £3000/£8.50) -->
    <!-- Y scale: 0 clicks = y310, 4000 clicks = y110. Each click = 0.05px. 353 clicks = y292.35 -->
    <polyline points="102,293 149,293 196,293 243,293 290,293 337,293 384,293 431,293 478,293 525,293 572,293 619,293"
      fill="none" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Organic line (compounding curve) -->
    <!-- M1:20, M2:50, M3:120, M4:300, M5:550, M6:900, M7:1300, M8:1800, M9:2300, M10:2800, M11:3200, M12:3500 -->
    <!-- y = 310 - (clicks * 200/4000) = 310 - clicks*0.05 -->
    <!-- M1:309, M2:307.5, M3:304, M4:295, M5:282.5, M6:265, M7:245, M8:220, M9:195, M10:170, M11:150, M12:135 -->
    <polyline points="102,309 149,307.5 196,304 243,295 290,282.5 337,265 384,245 431,220 478,195 525,170 572,150 619,135"
      fill="none" stroke="#22c55e" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Crossover annotation -->
    <line x1="384" y1="245" x2="384" y2="293" stroke="#d79f1e" stroke-width="1" stroke-dasharray="4,3" opacity="0.7"/>
    <circle cx="384" cy="269" r="4" fill="#d79f1e"/>
    <rect x="330" y="248" width="108" height="18" rx="4" ry="4" fill="#d79f1e" opacity="0.15"/>
    <text x="384" y="260" font-family="Arial, Helvetica, sans-serif" font-size="9" font-weight="bold" fill="#d79f1e" text-anchor="middle">Crossover: Month 7</text>

    <!-- End labels -->
    <text x="632" y="296" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="bold" fill="#ef4444">353/mo</text>
    <text x="632" y="138" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="bold" fill="#22c55e">3,500/mo</text>

    <!-- Legend -->
    <rect x="90" y="350" width="10" height="10" rx="2" ry="2" fill="#ef4444"/>
    <text x="106" y="359" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#e0e0e0">Paid ads (£3K/mo, flat clicks)</text>
    <rect x="310" y="350" width="10" height="10" rx="2" ry="2" fill="#22c55e"/>
    <text x="326" y="359" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#e0e0e0">Organic SEO (£3K/mo, compounding)</text>

    <!-- Bottom stat boxes -->
    <rect x="52" y="370" width="145" height="24" rx="6" ry="6" fill="#ef4444" opacity="0.1"/>
    <text x="124" y="386" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ef4444" text-anchor="middle">Paid CPL: £283</text>
    <rect x="210" y="370" width="145" height="24" rx="6" ry="6" fill="#22c55e" opacity="0.1"/>
    <text x="282" y="386" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#22c55e" text-anchor="middle">Organic CPL: £33</text>
    <rect x="368" y="370" width="180" height="24" rx="6" ry="6" fill="#d79f1e" opacity="0.1"/>
    <text x="458" y="386" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#d79f1e" text-anchor="middle">Organic 88% cheaper by M12</text>
  </g>
</svg>
