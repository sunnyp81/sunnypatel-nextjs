<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 380" width="720" height="380">
  <defs>
    <clipPath id="roundedClip2">
      <rect width="720" height="380" rx="16" ry="16"/>
    </clipPath>
    <filter id="cardShadow2">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <g clip-path="url(#roundedClip2)">
    <!-- Background -->
    <rect width="720" height="380" rx="16" ry="16" fill="#0a0a0f"/>

    <!-- Title -->
    <text x="36" y="36" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="bold" fill="#ffffff">Budget Allocation by Business Stage</text>
    <text x="36" y="54" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#e0e0e0" opacity="0.5">Recommended paid vs organic split as your business matures</text>

    <!-- Legend -->
    <rect x="530" y="22" width="10" height="10" rx="2" ry="2" fill="#ef4444"/>
    <text x="546" y="31" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#e0e0e0">Paid ads</text>
    <rect x="612" y="22" width="10" height="10" rx="2" ry="2" fill="#22c55e"/>
    <text x="628" y="31" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#e0e0e0">Organic SEO</text>

    <!-- Stage 1: Launch (months 1-3) -->
    <rect x="36" y="74" width="155" height="260" rx="10" ry="10" fill="#111118" filter="url(#cardShadow2)"/>
    <text x="113" y="98" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">Launch</text>
    <text x="113" y="114" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#e0e0e0" opacity="0.5" text-anchor="middle">Months 1-3</text>
    <!-- Stacked bar: 70% paid (red), 30% organic (green). Bar height 160px total, y start 130 -->
    <rect x="68" y="130" width="90" height="112" rx="6" ry="6" fill="#ef4444" opacity="0.85"/>
    <text x="113" y="190" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">70%</text>
    <text x="113" y="206" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#ffffff" opacity="0.7" text-anchor="middle">PAID</text>
    <rect x="68" y="244" width="90" height="48" rx="6" ry="6" fill="#22c55e" opacity="0.85"/>
    <text x="113" y="274" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">30%</text>
    <!-- Description -->
    <text x="113" y="310" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#e0e0e0" opacity="0.6" text-anchor="middle">Validate offer,</text>
    <text x="113" y="322" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#e0e0e0" opacity="0.6" text-anchor="middle">get conversion data</text>

    <!-- Stage 2: Growth (months 4-9) -->
    <rect x="205" y="74" width="155" height="260" rx="10" ry="10" fill="#111118" filter="url(#cardShadow2)"/>
    <text x="282" y="98" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">Growth</text>
    <text x="282" y="114" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#e0e0e0" opacity="0.5" text-anchor="middle">Months 4-9</text>
    <!-- 50/50 -->
    <rect x="237" y="130" width="90" height="80" rx="6" ry="6" fill="#ef4444" opacity="0.85"/>
    <text x="282" y="175" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">50%</text>
    <rect x="237" y="212" width="90" height="80" rx="6" ry="6" fill="#22c55e" opacity="0.85"/>
    <text x="282" y="257" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">50%</text>
    <text x="282" y="310" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#e0e0e0" opacity="0.6" text-anchor="middle">Organic starts</text>
    <text x="282" y="322" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#e0e0e0" opacity="0.6" text-anchor="middle">delivering traffic</text>

    <!-- Stage 3: Maturity (months 10-18) -->
    <rect x="374" y="74" width="155" height="260" rx="10" ry="10" fill="#111118" filter="url(#cardShadow2)"/>
    <text x="451" y="98" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">Maturity</text>
    <text x="451" y="114" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#e0e0e0" opacity="0.5" text-anchor="middle">Months 10-18</text>
    <!-- 30% paid, 70% organic -->
    <rect x="406" y="130" width="90" height="48" rx="6" ry="6" fill="#ef4444" opacity="0.85"/>
    <text x="451" y="160" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">30%</text>
    <rect x="406" y="180" width="90" height="112" rx="6" ry="6" fill="#22c55e" opacity="0.85"/>
    <text x="451" y="240" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">70%</text>
    <text x="451" y="256" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#ffffff" opacity="0.7" text-anchor="middle">ORGANIC</text>
    <text x="451" y="310" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#e0e0e0" opacity="0.6" text-anchor="middle">Organic compounds,</text>
    <text x="451" y="322" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#e0e0e0" opacity="0.6" text-anchor="middle">paid narrows focus</text>

    <!-- Stage 4: Established (18+) -->
    <rect x="543" y="74" width="155" height="260" rx="10" ry="10" fill="#111118" filter="url(#cardShadow2)"/>
    <text x="620" y="98" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">Established</text>
    <text x="620" y="114" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#e0e0e0" opacity="0.5" text-anchor="middle">Month 18+</text>
    <!-- 20% paid, 80% organic -->
    <rect x="575" y="130" width="90" height="32" rx="6" ry="6" fill="#ef4444" opacity="0.85"/>
    <text x="620" y="151" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">20%</text>
    <rect x="575" y="164" width="90" height="128" rx="6" ry="6" fill="#22c55e" opacity="0.85"/>
    <text x="620" y="232" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">80%</text>
    <text x="620" y="248" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#ffffff" opacity="0.7" text-anchor="middle">ORGANIC</text>
    <text x="620" y="310" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#e0e0e0" opacity="0.6" text-anchor="middle">Organic drives growth,</text>
    <text x="620" y="322" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#e0e0e0" opacity="0.6" text-anchor="middle">paid is surgical only</text>

    <!-- Arrow connecting stages -->
    <text x="195" y="220" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#5B8AEF" opacity="0.6" text-anchor="middle">&gt;</text>
    <text x="364" y="220" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#5B8AEF" opacity="0.6" text-anchor="middle">&gt;</text>
    <text x="533" y="220" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#5B8AEF" opacity="0.6" text-anchor="middle">&gt;</text>

    <!-- Bottom annotation -->
    <text x="360" y="358" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#5B8AEF" opacity="0.7" text-anchor="middle">Shift ratio as organic traffic compounds and cost per lead drops</text>
    <text x="360" y="374" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#e0e0e0" opacity="0.4" text-anchor="middle">sunnypatel.co.uk</text>
  </g>
</svg>
