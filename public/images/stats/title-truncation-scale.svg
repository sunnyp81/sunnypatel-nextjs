<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" width="720" height="420">
  <defs>
    <clipPath id="clip-title">
      <rect x="0" y="0" width="720" height="420" rx="16" ry="16"/>
    </clipPath>
  </defs>
  <g clip-path="url(#clip-title)">
    <rect width="720" height="420" fill="#0a0a0f" rx="16" ry="16"/>

    <!-- Title -->
    <text x="36" y="38" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="bold" fill="#ffffff">1,546 Page-One Rankings. Almost Zero Clicks.</text>
    <text x="36" y="56" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#e0e0e0" opacity="0.5">wagearea.com — automated titles too long for Google to display, truncated to gibberish</text>

    <!-- Big stat -->
    <text x="360" y="110" font-family="Arial, Helvetica, sans-serif" font-size="56" font-weight="bold" fill="#5B8AEF" text-anchor="middle">1,546</text>
    <text x="360" y="132" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#e0e0e0" opacity="0.5" text-anchor="middle">pages ranking on Google page 1 with nearly 0% CTR</text>

    <!-- SERP mockup: BEFORE -->
    <text x="36" y="170" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" fill="#ef4444">BEFORE: What searchers saw</text>

    <!-- Fake SERP result BEFORE -->
    <rect x="36" y="182" width="648" height="72" rx="8" fill="#111118" stroke="#ef4444" stroke-opacity="0.2" stroke-width="1"/>
    <text x="52" y="204" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#5B8AEF">Programmers and software development professionals Salary G...</text>
    <rect x="52" y="212" width="580" height="2" rx="1" fill="#ef4444" opacity="0.15"/>
    <text x="52" y="228" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#22c55e" opacity="0.8">wagearea.com &#x203A; programmer-and-software-development-professional</text>
    <text x="52" y="244" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#e0e0e0" opacity="0.4">Average salary data for programmers and software development professionals in the UK...</text>

    <!-- Truncation indicator -->
    <rect x="600" y="194" width="72" height="20" rx="4" fill="#ef4444" fill-opacity="0.15"/>
    <text x="636" y="208" font-family="Arial, Helvetica, sans-serif" font-size="9" font-weight="bold" fill="#ef4444" text-anchor="middle">TRUNCATED</text>

    <!-- SERP mockup: AFTER -->
    <text x="36" y="280" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" fill="#22c55e">AFTER: Template-level title fix</text>

    <!-- Fake SERP result AFTER -->
    <rect x="36" y="292" width="648" height="72" rx="8" fill="#111118" stroke="#22c55e" stroke-opacity="0.2" stroke-width="1"/>
    <text x="52" y="314" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#5B8AEF">Software Developers Salary UK — 2025 Average Pay | wagearea.com</text>
    <text x="52" y="338" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#22c55e" opacity="0.8">wagearea.com &#x203A; software-developer</text>
    <text x="52" y="354" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#e0e0e0" opacity="0.4">UK software developer salaries by city and region. Median pay, hourly rates, and career...</text>

    <!-- Clean indicator -->
    <rect x="600" y="304" width="72" height="20" rx="4" fill="#22c55e" fill-opacity="0.15"/>
    <text x="636" y="318" font-family="Arial, Helvetica, sans-serif" font-size="9" font-weight="bold" fill="#22c55e" text-anchor="middle">FITS</text>

    <!-- Bottom stats row -->
    <rect x="36" y="380" width="210" height="28" rx="6" fill="#111118"/>
    <text x="141" y="399" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#e0e0e0" text-anchor="middle">Before: <tspan font-weight="bold" fill="#ef4444">0.21% CTR</tspan></text>

    <rect x="258" y="380" width="210" height="28" rx="6" fill="#111118"/>
    <text x="363" y="399" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#e0e0e0" text-anchor="middle">After: <tspan font-weight="bold" fill="#22c55e">impressions +134%</tspan></text>

    <rect x="480" y="380" width="210" height="28" rx="6" fill="#111118"/>
    <text x="585" y="399" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#e0e0e0" text-anchor="middle">Fix: <tspan font-weight="bold" fill="#5B8AEF">1 template change</tspan></text>
  </g>
</svg>
