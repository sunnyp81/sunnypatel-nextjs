faqs:
  - question: How do you calculate the ROI of SEO?
    answer: >-
      Divide net return by cost: SEO ROI = (revenue attributable to SEO minus
      SEO cost) / SEO cost, expressed as a percentage. To forecast it before
      spending, estimate monthly clicks from keyword search volume and the
      click-through rate at your target position, convert clicks to leads with
      your conversion rate, multiply by average deal value, then compare
      first-year revenue against first-year cost.
  - question: What is a good ROI for SEO?
    answer: >-
      A campaign that pays back its cost within 6 to 12 months and finishes
      year one positive is generally healthy. First-year ROI often looks modest
      because rankings ramp slowly, then improves in year two when the traffic
      holds without proportionate extra spend. Judge SEO over 24 months, not
      one quarter.
  - question: How long does it take for SEO to pay for itself?
    answer: >-
      Most campaigns targeting winnable keywords reach payback somewhere
      between month 6 and month 12: the month where cumulative incremental
      revenue passes cumulative cost. Competitive keywords or new domains push
      that later. If a forecast shows no payback within 18 months, the keyword
      choice or the offer usually needs rethinking before the budget does.
  - question: How do I measure SEO revenue if my leads convert offline?
    answer: >-
      Track the handoff, not the sale. Fire a conversion event when the lead
      form, call, or booking happens, then multiply leads by your known average
      deal value and close rate from your sales records. It is less precise
      than ecommerce tracking but it is consistent. Consistency is what makes
      the ROI trend trustworthy.
