title: In-House SEO vs Agency vs Consultant
metaTitle: 'In-House SEO vs Agency vs Consultant: Which Is Right For Your Business? (2026)'
description: >-
  Real costs, honest trade-offs, and a decision framework for business owners
  choosing between in-house SEO, agency retainers, and independent consultants.
ogImage: /images/stats/seo-resourcing-cost-comparison.svg
date: '2026-04-06'
tags:
  - SEO Strategy
  - SEO Consultancy
  - SEO Agency
faqs:
  - question: How much does an in-house SEO manager cost compared to an agency?
    answer: >-
      An in-house SEO manager in the UK costs £35,000–£55,000 in salary plus
      roughly 25–30% on-costs (employer NI, pension, holiday, benefits),
      bringing the real annual cost to £44,000–£71,500. A mid-tier agency
      retainer runs £2,000–£5,000 per month (£24,000–£60,000/yr). The numbers
      overlap — but the agency gives you a team of specialists, while the
      in-house hire gives you one person who may or may not have depth across
      technical SEO, content, and link acquisition simultaneously.
  - question: >-
      At what revenue level does hiring an in-house SEO person make sense?
    answer: >-
      A useful rule of thumb: if SEO is your primary acquisition channel and
      your monthly organic revenue exceeds £50,000, an in-house hire starts to
      make financial sense — provided you also have the technical infrastructure
      (dev resource, CMS access, content budget) for them to execute. Below that
      threshold, a consultant or agency typically delivers better ROI because
      you're not paying for headcount you can't fully utilise.
  - question: Can a consultant work alongside an in-house SEO team?
    answer: >-
      Yes, and this is often the highest-ROI model. A consultant provides
      strategy, technical oversight, and quality control while an in-house
      executive or content team handles execution. The consultant costs
      £500–£1,500 per day but works a fraction of the hours — typically 2–4
      days per month per client. That frees the in-house person to focus on
      output rather than trying to develop strategy in isolation.
  - question: What should I ask an SEO agency or consultant before signing a retainer?
    answer: >-
      Three questions that separate credible providers from the rest: Who
      specifically will be doing the work on my account (not who presented)?
      Can you show me GSC data from a comparable client at 6 and 12 months?
      What does success look like in month three, and what would you do
      differently if we're not hitting it? Anyone who can't answer all three
      concretely is not someone you want managing your organic acquisition
      channel.
