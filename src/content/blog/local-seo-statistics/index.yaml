faqs:
  - question: What percentage of "near me" searches lead to a store visit?
    answer: >-
      76% of people who search for something "near me" on a mobile phone visit a related business within 24 hours, and 28% of those searches result in a purchase. Around 1.5 billion "near me" searches happen globally every month, roughly 50 million per day. (Sources: Backlinko, BrightLocal, 2026)
  - question: How important is the Google Local Pack for clicks?
    answer: >-
      The Google Local Pack (Map Pack) captures 44% of all clicks on local search results pages, and the top three results within it receive 93% of local pack clicks. Ranking fourth in the Local Pack delivers almost no traffic, so securing one of the three visible positions is the core goal of local SEO. (Source: BrightLocal, 2026)
  - question: Does a complete Google Business Profile actually drive more business?
    answer: >-
      Yes. Businesses with complete Google Business Profiles receive 7 times more clicks than those with incomplete profiles and are 2.7 times more likely to be seen as reputable. With 98% of consumers searching online for local businesses, the profile is the single highest-return asset in local SEO. (Source: Google, BrightLocal, 2026)
  - question: How much of local search is on mobile?
    answer: >-
      84% of local searches are conducted on mobile devices, and 30% of all mobile searches are location-related. Because 53% of mobile users abandon a site that takes longer than three seconds to load, mobile page speed directly affects whether local search visibility converts to enquiries. (Sources: BrightLocal, Google, 2026)
  - question: Do online reviews affect local rankings and conversions?
    answer: >-
      Reviews are both a ranking and a conversion factor. 88% of consumers would use a business that responds to all its reviews, but only 47% would consider one that does not respond at all, a 41-point trust gap. 71% of consumers will not use a business rated below 3 stars, so maintaining a 4-plus star average with steady recent reviews is essential. (Source: BrightLocal, 2026)
