title: How to Tell If Your SEO Agency Is Lying to You
metaTitle: 'How to Tell If Your SEO Agency Is Lying to You (2026 Red Flags)'
description: >-
  I've audited sites managed by agencies for years with zero growth. Here are
  the red flags in their reports and 5 questions to ask right now.
ogImage: /images/stats/seo-agency-red-flags.svg
date: '2026-04-06'
tags:
  - SEO Agency
  - SEO Strategy
  - SEO Audit
faqs:
  - question: How do I know if my SEO agency is doing a good job?
    answer: >-
      Check three things in Google Search Console: non-brand click growth over 6
      months, the number of pages driving organic traffic, and whether technical
      issues are decreasing quarter over quarter. If your agency can't show you
      these numbers directly in GSC, that's a problem.
  - question: What metrics should an SEO agency report on?
    answer: >-
      Honest SEO reporting includes non-brand vs brand traffic split, actual
      clicks (not just impressions), pages indexed vs pages driving traffic,
      technical fixes completed, and revenue or leads attributed to organic
      search. Domain Authority alone is not a Google metric and shouldn't be the
      headline number.
  - question: When should I fire my SEO agency?
    answer: >-
      Fire your agency if after 6 months you see no non-brand traffic growth,
      you don't have owner access to Google Search Console, they can't explain
      specific work completed last month, or their monthly reports contain the
      same generic template with no actionable insights.
  - question: Should my SEO agency give me access to Google Search Console?
    answer: >-
      Yes. You should have owner-level access to Google Search Console at all
      times. Any agency that refuses or delays giving you direct access is a red
      flag. GSC is your data about your website — there's no legitimate reason
      to withhold it.
