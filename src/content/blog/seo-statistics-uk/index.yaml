faqs:
  - question: What is the average ROI of SEO in the UK?
    answer: >-
      The average ROI of SEO across all industries is 825%, meaning businesses
      earn £8.25 for every £1 invested over a three-year period. Industry
      returns vary significantly: Real Estate reaches 1,389% ROI, Financial
      Services 1,031%, Medical Devices 1,183%, and B2B SaaS 702%. SEO generates
      leads at 61% lower cost than paid search, and SEO leads close at a 14.6%
      rate compared to 1.7% for outbound channels. (Source: First Page Sage, 2024)
  - question: What percentage of web traffic comes from organic search?
    answer: >-
      Organic search drives 53.3% of all website traffic globally, making it the
      single largest traffic source across every industry — more than paid search,
      social media, referral, and direct combined. SEO drives over 1,000% more
      traffic than organic social media. For blog content specifically, 85.19% of
      all blog traffic originates from organic search. (Source: BrightEdge, 2025)
  - question: What is the click-through rate for position 1 on Google?
    answer: >-
      Position 1 on Google captures 27.6% of all clicks for a given query.
      Position 2 receives 15.8%, position 3 gets 11.0%, and positions 4-10
      receive progressively less. The top three results collectively capture
      68.7% of all clicks. Page two results (positions 11+) receive just 0.63%
      of clicks — making page two effectively invisible. (Source: Backlinko, 2024)
  - question: How is AI search affecting SEO and organic traffic?
    answer: >-
      Google's AI Overviews appear in approximately 13% of US desktop searches
      and reduce organic CTR by 61% for affected queries. However, brands cited
      within AI Overviews earn 35% more organic clicks than uncited brands.
      58.5% of Google searches now end with zero clicks. AI referral traffic
      grew 778% year-over-year but still accounts for only about 1% of total
      web traffic. The implication: building topical authority that earns AI
      citations protects and amplifies organic performance.
  - question: What percentage of UK searches have local intent?
    answer: >-
      46% of all Google searches have local intent — nearly half of all search
      activity involves someone looking for a nearby service, shop, or professional.
      76% of people who perform a local search on mobile visit a related business
      within 24 hours, and 28% of those searches result in a purchase. 87% of
      UK consumers used Google to evaluate local businesses in 2024. (Source: Google, BrightLocal)
  - question: How many websites pass Google's Core Web Vitals?
    answer: >-
      Only 49.7% of mobile websites pass Google's Core Web Vitals assessment,
      meaning more than half of all mobile sites fail Google's own performance
      thresholds. A one-second delay in page load time reduces conversions by
      approximately 20%, and 53% of mobile users abandon sites that take longer
      than three seconds to load. Only 30% of web pages implement any structured
      data markup despite it increasing CTR by up to 30%. (Source: HTTP Archive, Google)
