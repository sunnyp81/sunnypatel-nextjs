faqs:
  - question: What is the average ROI of SEO in the UK?
    answer: >-
      The average SEO ROI across all industries is 825%, with variations like Real Estate at 1,389% and B2B SaaS at 702%. SEO also generates leads at 61% lower cost than paid search, with a 14.6% close rate. (Source: First Page Sage, 2024)
  - question: What percentage of web traffic comes from organic search?
    answer: >-
      Globally, organic search accounts for 53.3% of all website traffic, making it the largest source across industries. It drives over 1,000% more traffic than organic social media. For blog content, 85.19% of traffic originates from organic search. (Source: BrightEdge, 2025)
  - question: What is the click-through rate for position 1 on Google?
    answer: >-
      Google's Position 1 secures 27.6% of clicks, followed by 15.8% for Position 2 and 11.0% for Position 3. The top three results capture 68.7% of all clicks, while page two results (Position 11+) receive only 0.63%, rendering them effectively invisible. (Source: Backlinko, 2024)
  - question: How is AI search affecting SEO and organic traffic?
    answer: >-
      Google's AI Overviews now appear in roughly 25% of searches (up from 13% in early 2025) and reduce organic CTR by 61% when present. Yet cited brands gain 35% more clicks. With 68% of Google searches ending in zero clicks in 2026 (up from 58.5% in 2024), earning AI citations through topical authority is crucial for protecting and amplifying organic performance. (Sources: Conductor 2026, Seer Interactive, SparkToro 2026)
  - question: What percentage of UK searches have local intent?
    answer: >-
      46% of Google searches have local intent. Notably, 76% of mobile local searchers visit a related business within 24 hours, with 28% making a purchase. In 2024, 87% of UK consumers used Google to evaluate local businesses, highlighting the importance of local SEO. (Source: Google, BrightLocal)
  - question: How many websites pass Google's Core Web Vitals?
    answer: >-
      Only 49.7% of mobile websites pass Google's Core Web Vitals. A one-second page load delay reduces conversions by 20%, with 53% of mobile users abandoning sites taking over three seconds. Additionally, only 30% of web pages use structured data, despite a potential 30% CTR increase. (Source: HTTP Archive, Google)
  - question: What is the typical organic search market share in the UK?
    answer: >-
      In the UK, Google dominates the organic search market, consistently holding over 90% of the market share. This high concentration makes optimizing for Google's algorithm paramount for businesses targeting the UK audience.
  - question: How does mobile search impact UK SEO strategies?
    answer: >-
      Mobile search significantly impacts UK SEO strategies, with a growing percentage of searches originating from mobile devices. Optimizing for mobile-friendliness, page speed, and local intent is crucial for capturing this expanding audience.
  - question: What role does E-E-A-T play in UK SEO?
    answer: >-
      E-E-A-T (Experience, Expertise, Authoritativeness, Trustworthiness) is vital for UK SEO, especially for YMYL (Your Money Your Life) topics. Google prioritizes content from credible sources, making it essential to demonstrate clear expertise and build trust with your audience.
