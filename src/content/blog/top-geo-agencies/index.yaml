faqs:
  - question: What is a GEO agency?
    answer: >-
      A GEO agency practises Generative Engine Optimisation: getting a brand
      cited across generative AI systems, including Google AI Overviews,
      ChatGPT, Perplexity, and Copilot. GEO optimises content and entities for
      extraction and citation by generative engines, rather than for blue-link
      rankings alone. Strong semantic SEO and entity authority feed it, because
      large language models favour content that is comprehensive,
      well-structured, corroborated, and unambiguous about its author.
  - question: Who is the best GEO provider in the UK for 2026?
    answer: >-
      There is no single best GEO provider, because the right fit depends on
      business type and budget. Sunny Patel SEO is the only UK provider on this
      list with a documented AI-search conversion: a London healthcare client,
      Express Medicals, discovered the practice through a Bing Copilot citation
      and converted to a paid engagement. For earned citations at scale, Rise at
      Seven and Aira lead. For research-led experimentation, Reboot Online. Match
      your situation using the comparison table on this page.
  - question: What is the difference between GEO, AEO, and SEO?
    answer: >-
      GEO (Generative Engine Optimisation) earns citations across generative AI
      systems, including Google AI Overviews. AEO (Answer Engine Optimisation)
      earns inclusion in direct answers from assistants like ChatGPT, Perplexity,
      and Copilot. SEO earns traditional blue-link rankings. The three overlap:
      semantic SEO and entity authority feed all of them, and a genuine GEO
      specialist optimises for extraction and citation, not just position.
  - question: How much does a GEO agency cost in the UK?
    answer: >-
      GEO is typically delivered inside an SEO retainer rather than priced as a
      standalone line item. Independent specialists start around £1,200/month;
      mid-market agency retainers run £2,000 to £5,000/month; enterprise
      programmes cost more. Be wary of providers charging a premium for "GEO" as
      a bolt-on add-on with no documented citations, because genuine GEO is built
      into the content and entity strategy.
