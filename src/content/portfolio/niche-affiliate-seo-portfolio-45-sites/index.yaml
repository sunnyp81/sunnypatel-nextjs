year: '2024'
problem: >-
  SEO methodology is easy to theorise. It is far harder to prove at scale, across
  different industries, with real revenue consequences for getting it wrong. Most
  consultants apply a single client's learnings to their next client. A 45-site
  live portfolio provides something different: a testing environment where
  methodology is validated across technology, health, home, outdoor, automotive,
  and e-commerce verticals simultaneously.
solution: >-
  Built and operate a portfolio of 45 niche websites — each managed as a live
  SEO experiment. Every site follows the same semantic SEO framework: topical
  mapping before content production, entity-based authority building, technical
  precision across crawlability and indexation, and data-driven iteration. Sites
  are segmented by performance tier. Underperformers are audited and fixed or
  culled. Winners are doubled down on. The methodology that emerges from this
  process — tested against real rankings, real traffic, and real revenue — is
  what I bring to client engagements.
result: >-
  The portfolio generates 16,949 monthly organic clicks across 12 verticals, with
  120,000+ AI Copilot citations proving that entity-based content architecture
  earns AI search visibility alongside traditional rankings. Peak affiliate
  conversion rate of 6.51% — 5x industry average — validates that high-intent
  content architecture directly drives commercial outcomes. The same framework
  applied to client accounts has produced results including 244% average organic
  traffic growth and 3x enquiry rate improvements.
