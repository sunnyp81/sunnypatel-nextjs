year: '2025'
problem: >-
  A Reading-based professional services firm had been investing in SEO
  sporadically for several years with limited results. Organic traffic had
  plateaued at around 180 visits per month — generating occasional enquiries
  but not functioning as a reliable client acquisition channel. The firm
  relied primarily on referrals and word-of-mouth, which, while consistent,
  provided no scalability or control. Competitors with less credibility were
  ranking above them for the firm's core service terms.
solution: >-
  The engagement began with a technical audit identifying crawl and indexation
  issues that were suppressing existing pages. A topical map was developed for
  the firm's primary practice areas, establishing a content architecture that
  would demonstrate comprehensive expertise to Google rather than isolated
  keyword pages. Content was produced systematically across the topical cluster,
  with internal linking structured to concentrate authority toward the firm's
  highest-value commercial pages. Local SEO signals — Google Business Profile,
  citation consistency, and location-specific content — were reinforced
  throughout.
result: >-
  Over nine months, organic traffic grew from 180 to 620 visits per month — a
  244% increase. More significantly, monthly enquiries from organic search
  tripled. Organic became a consistent, measurable client acquisition channel
  alongside the firm's existing referral network. The director's assessment:
  "Before working with Sunny, we were getting around 180 organic visits a month.
  Nine months later we're at 620 and enquiries from organic have tripled."
