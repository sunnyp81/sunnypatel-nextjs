<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; overflow: hidden; }
  .card {
    position: relative;
    width: 1200px; height: 630px;
    background: radial-gradient(ellipse at 18% 0%, #1b2148 0%, #0a0c1c 50%, #050507 100%);
    color: #f5f5f7;
    font-family: 'Sora', sans-serif;
    overflow: hidden;
  }
  /* top accent bar */
  .accent { position:absolute; top:0; left:0; right:0; height:5px;
    background: linear-gradient(90deg, #5B8AEF, #7B5AEF 50%, #5B8AEF); }

  /* subtle grid texture */
  .grid { position:absolute; inset:0;
    background-image:
      linear-gradient(rgba(123,163,245,0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(123,163,245,0.05) 1px, transparent 1px);
    background-size: 48px 48px; mask-image: radial-gradient(ellipse at 20% 30%, #000 0%, transparent 70%); }

  /* right portrait panel */
  .photo-panel { position:absolute; top:0; right:0; width:430px; height:630px;
    background: linear-gradient(180deg, rgba(123,163,245,0.10) 0%, rgba(10,12,28,0) 55%); }
  .photo-panel::before { content:""; position:absolute; left:0; top:0; bottom:0; width:1px;
    background: linear-gradient(180deg, transparent, rgba(123,163,245,0.35), transparent); }
  .photo { position:absolute; right:24px; bottom:0; height:560px;
    -webkit-mask-image: linear-gradient(180deg, transparent 0%, #000 14%, #000 100%);
            mask-image: linear-gradient(180deg, transparent 0%, #000 14%, #000 100%); }

  /* content */
  .pad { position:absolute; inset:0; padding:70px 78px; display:flex; flex-direction:column; justify-content:space-between; }
  .top { display:flex; align-items:center; gap:18px; }
  .mono { width:62px; height:62px; border-radius:15px; background:#0d0d14;
    border:2px solid rgba(91,138,239,0.45); display:flex; align-items:center; justify-content:center;
    font-size:30px; font-weight:800; color:#7ba3f5; letter-spacing:-1px; }
  .domain { font-size:25px; color:#aab; font-weight:500; }

  .hero { max-width:680px; }
  .eyebrow { font-size:22px; font-weight:600; letter-spacing:.16em; text-transform:uppercase;
    color:#7ba3f5; margin-bottom:14px; }
  .bignum { font-size:188px; font-weight:800; line-height:.9; letter-spacing:-6px;
    background: linear-gradient(180deg,#ffffff,#9db8f5); -webkit-background-clip:text; background-clip:text; color:transparent; }
  .sub { font-size:34px; font-weight:600; color:#e7e9f5; margin-top:10px; letter-spacing:-.5px; }
  .subline { font-size:24px; color:#8a90a8; margin-top:6px; font-weight:400; }

  /* mini sparkline */
  .bars { display:flex; align-items:flex-end; gap:9px; height:78px; margin-top:26px; }
  .bar { width:26px; border-radius:5px 5px 0 0; background:linear-gradient(180deg,#7ba3f5,#5B8AEF); opacity:.9; }

  .foot { display:flex; align-items:center; gap:16px; }
  .ava { width:54px; height:54px; border-radius:50%; border:2px solid rgba(123,163,245,.5); object-fit:cover; object-position:top; }
  .name { font-size:24px; font-weight:700; color:#fff; }
  .role { font-size:19px; color:#8a90a8; }
  .pill { margin-left:auto; font-size:20px; font-weight:600; color:#0a0c1c;
    background:#7ba3f5; padding:12px 22px; border-radius:999px; }
</style>
</head>
<body>
  <div class="card">
    <div class="accent"></div>
    <div class="grid"></div>
    <div class="photo-panel">
      <img class="photo" src="../public/images/sunny-patel-seo-consultant.png" />
    </div>
    <div class="pad">
      <div class="top">
        <div class="mono">SP</div>
        <div class="domain">sunnypatel.co.uk</div>
      </div>

      <div class="hero">
        <div class="eyebrow">Avg. organic growth</div>
        <div class="bignum">+244%</div>
        <div class="sub">SEO that generates clients, not reports.</div>
        <div class="subline">180 → 620 visits in 9 months · 40+ UK businesses</div>
        <div class="bars">
          <div class="bar" style="height:22%"></div>
          <div class="bar" style="height:30%"></div>
          <div class="bar" style="height:28%"></div>
          <div class="bar" style="height:46%"></div>
          <div class="bar" style="height:58%"></div>
          <div class="bar" style="height:74%"></div>
          <div class="bar" style="height:100%"></div>
        </div>
      </div>

      <div class="foot">
        <img class="ava" src="../public/images/sunny-patel-seo-consultant.png" />
        <div>
          <div class="name">Sunny Patel</div>
          <div class="role">Independent SEO Consultant · Reading &amp; Berkshire</div>
        </div>
        <div class="pill">Free 30-min audit</div>
      </div>
    </div>
  </div>
</body>
</html>
